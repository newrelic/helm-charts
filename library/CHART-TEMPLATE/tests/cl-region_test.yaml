suite: test region helper
templates:
  - templates/example-cm-region.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: Is US by default
    asserts:
      - equal:
          path: data.region
          value: US

  - it: Is US with everything null
    set:
      global: null
      region: null
    asserts:
      - equal:
          path: data.region
          value: US

  - it: Detects EU license key
    set:
      global: null
      region: null
      licenseKey: eu01xx77XXXXf1XXXX0bXXXX6aXXXX9eFFFFNRAL
    asserts:
      - equal:
          path: data.region
          value: EU

  - it: Detects Japan license key
    set:
      global: null
      region: null
      licenseKey: jpxNotARelLicenceKeyFFFFNRAL
    asserts:
      - equal:
          path: data.region
          value: JP

  - it: Set region (globally)
    set:
      global:
        region: EU
    asserts:
      - equal:
          path: data.region
          value: EU

  - it: Set region (locally)
    set:
      region: EU
    asserts:
      - equal:
          path: data.region
          value: EU

  - it: Set Japan region (globally)
    set:
      global:
        region: JP
    asserts:
      - equal:
          path: data.region
          value: JP

  - it: Set Japan region (locally)
    set:
      region: JP
    asserts:
      - equal:
          path: data.region
          value: JP

  - it: Overrides global region with the local one
    set:
      global:
        region: EU
      region: DEV
    asserts:
      - equal:
          path: data.region
          value: DEV

  - it: Honors staging flag
    set:
      nrStaging: true
    asserts:
      - equal:
          path: data.region
          value: STG

  - it: Honors global staging flag
    set:
      global.nrStaging: true
    asserts:
      - equal:
          path: data.region
          value: STG

  - it: Honors fedramp flag
    set:
      fedramp:
        enabled: true
    asserts:
      - equal:
          path: data.region
          value: GOV

  - it: Honors global fedramp flag
    set:
      global:
        fedramp:
          enabled: true
    asserts:
      - equal:
          path: data.region
          value: GOV

  - it: Convenience Functions work for US
    set:
      global:
        region: US
    asserts:
      - equal:
          path: data
          value:
            region: US
            region_with_interposed_check: US
            is_us: Yes
            is_eu: No
            is_jp: No
            is_gov: No
            is_stg: No
            is_dev: No



  - it: Convenience Functions work for EU
    set:
      global:
        region: EU
    asserts:
      - equal:
          path: data
          value:
            region: EU
            region_with_interposed_check: EU
            is_us: No
            is_eu: Yes
            is_jp: No
            is_gov: No
            is_stg: No
            is_dev: No

  - it: Convenience Functions work for JP
    set:
      global:
        region: JP
    asserts:
      - equal:
          path: data
          value:
            region: JP
            region_with_interposed_check: JP
            is_us: No
            is_eu: No
            is_jp: Yes
            is_gov: No
            is_stg: No
            is_dev: No

  - it: Convenience Functions work for Gov
    set:
      fedramp:
        enabled: true
    asserts:
      - equal:
          path: data
          value:
            region: GOV
            region_with_interposed_check: GOV
            is_us: No
            is_eu: No
            is_jp: No
            is_gov: Yes
            is_stg: No
            is_dev: No

  - it: Convenience Functions work for STG
    set:
      global:
        nrStaging: true
    asserts:
      - equal:
          path: data
          value:
            region: STG
            region_with_interposed_check: STG
            is_us: No
            is_eu: No
            is_jp: No
            is_gov: No
            is_stg: Yes
            is_dev: No

  - it: Convenience Functions work for Dev
    set:
      region: dev
    asserts:
      - equal:
          path: data
          value:
            region: DEV
            region_with_interposed_check: DEV
            is_us: No
            is_eu: No
            is_jp: No
            is_gov: No
            is_stg: No
            is_dev: Yes

  - it: Should should fail if region can not be resolved
    set:
      customSecretLicenseKey: my-secret-license-key
    asserts:
      - failedTemplate:
          errorMessage: "This Helm Chart is not able to compute the region. You must specify a .global.region or .region if the license is set using a custom secret."

  - it: Field with fail_if_unresolvable should resolve to same value as field without it
    set:
      global:
        region: JP
    asserts:
      - equal:
          path: data.region
          value: JP
      - equal:
          path: data.region_with_interposed_check
          value: JP