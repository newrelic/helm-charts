{{- if and .Values.agentControlCd.enabled .Values.rbac.useMinimalPermissions }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "10"
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
    agent-control.newrelic.com/minimal-permissions: "true"
  name: newrelic-ac-minimal
rules:
  # Namespaces - Required to create Flux namespace and agents namespace
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, create, patch, update]

  # CRDs - Required to install Flux CRDs
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, create, update, patch, delete]

  # Flux Resources - Required for Flux to manage Helm releases
  - apiGroups:
      - source.toolkit.fluxcd.io
      - helm.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
    resources:
      - helmrepositories
      - helmreleases
      - helmcharts
      - gitrepositories
      - buckets
      - ocirepositories
      - kustomizations
      - alerts
      - providers
      - receivers
    verbs: [get, list, watch, create, update, patch, delete]

  # Flux Resources Status - Required for Flux to update status
  - apiGroups:
      - source.toolkit.fluxcd.io
      - helm.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
    resources:
      - helmrepositories/status
      - helmreleases/status
      - helmcharts/status
      - gitrepositories/status
      - buckets/status
      - ocirepositories/status
      - kustomizations/status
      - alerts/status
      - providers/status
      - receivers/status
    verbs: [get, update, patch]

  # Secrets - Required for Flux and Agent Control to store credentials
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]

  # ConfigMaps - Required for Flux and Agent Control configuration
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]

  # ServiceAccounts - Required to create Flux controller service accounts
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, create, update, patch, delete]

  # RBAC - Required to create roles for Flux controllers
  - apiGroups: [rbac.authorization.k8s.io]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: [get, list, create, update, patch, delete, bind, escalate]

  # Deployments - Required for Flux controllers and agent workloads
  - apiGroups: [apps]
    resources: [deployments, daemonsets, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]

  # ReplicaSets - Required for Flux controllers
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]

  # Pods - Required to monitor Flux controllers and agents
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]

  # Jobs - Required for Bootstrap installation/uninstallation jobs
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]

  # Endpoints - Required for Flux service endpoint discovery
  - apiGroups: [""]
    resources: [endpoints]
    verbs: [get, list, watch]

  # Services - Required for Flux notification webhook
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, create, update, patch, delete]

  # Network Policies - Uncomment if your Flux deployment requires NetworkPolicies
  # - apiGroups: [networking.k8s.io]
  #   resources: [networkpolicies]
  #   verbs: [get, list, create, update, patch, delete]

  # Events - Required for Flux to emit events
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch, create, patch]

  # New Relic Custom Resources - Required for Agent Control
  # Restricted to specific resources instead of wildcard for better security
  - apiGroups: [newrelic.com]
    resources:
      - instrumentations
      - instrumentations/status
    verbs: [get, list, watch, create, update, patch, delete]

  # Leases - Required for Flux leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, create, update, patch, delete]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "11"
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
    agent-control.newrelic.com/minimal-permissions: "true"
  name: newrelic-ac-minimal
subjects:
  - kind: ServiceAccount
    name: {{ include "newrelic.common.naming.truncateToDNSWithSuffix" (dict "name" .Release.Name "suffix" "install-job") }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: newrelic-ac-minimal
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-20"
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
    agent-control.newrelic.com/minimal-permissions: "true"
  name: newrelic-agent-control-flux-uninstall-minimal
rules:
  # Permissions for cleanup during uninstall
  - apiGroups:
      - source.toolkit.fluxcd.io
      - helm.toolkit.fluxcd.io
      - kustomize.toolkit.fluxcd.io
      - notification.toolkit.fluxcd.io
    resources: ["*"]
    verbs: [get, list, delete, deletecollection]

  - apiGroups: [""]
    resources: [namespaces, secrets, configmaps, serviceaccounts, services, endpoints]
    verbs: [get, list, delete, deletecollection]

  - apiGroups: [apps]
    resources: [deployments, daemonsets, statefulsets, replicasets]
    verbs: [get, list, delete, deletecollection]

  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, delete, deletecollection]

  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles, clusterrolebindings, roles, rolebindings]
    verbs: [get, list, delete]

  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, delete]

  - apiGroups: [newrelic.com]
    resources:
      - instrumentations
    verbs: [get, list, delete, deletecollection]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-19"
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
    agent-control.newrelic.com/minimal-permissions: "true"
  name: newrelic-agent-control-flux-uninstall-minimal
subjects:
  - kind: ServiceAccount
    name: {{ include "newrelic.common.naming.truncateToDNSWithSuffix" (dict "name" .Release.Name "suffix" "uninstall-job") }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: newrelic-agent-control-flux-uninstall-minimal
  apiGroup: rbac.authorization.k8s.io
{{- end }}
