suite: test provider-specific configurations
templates:
  - templates/daemonset.yaml
  - templates/configmap.yaml
  - templates/persistentvolume.yaml
release:
  name: my-release
  namespace: my-namespace
tests:
  - it: GKE_AUTOPILOT sets linuxMountPath to /var/log
    set:
      licenseKey: nr_license_key
      provider: GKE_AUTOPILOT
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /var/log
            readOnly: true
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: logs
            hostPath:
              path: /var/log
        template: templates/daemonset.yaml

  - it: GKE_AUTOPILOT sets persistence mode to none - FB_DB is empty, logs are read-only, no PV created
    set:
      licenseKey: nr_license_key
      provider: GKE_AUTOPILOT
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FB_DB
            value: ""
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /var/log
            readOnly: true
        template: templates/daemonset.yaml
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: fb-db-pvc
            mountPath: /db
        template: templates/daemonset.yaml
      - isNullOrEmpty:
          path: spec.template.spec.initContainers
        template: templates/daemonset.yaml
      - hasDocuments:
          count: 0
        template: templates/persistentvolume.yaml

  - it: GKE_AUTOPILOT user-supplied linuxMountPath takes precedence over provider
    set:
      licenseKey: nr_license_key
      provider: GKE_AUTOPILOT
      fluentBit.linuxMountPath: /custom/logs
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /custom/logs
            readOnly: true
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: logs
            hostPath:
              path: /custom/logs
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FB_DB
            value: ""
        template: templates/daemonset.yaml

  - it: GKE_AUTOPILOT user-supplied persistence.mode takes precedence over provider
    set:
      licenseKey: nr_license_key
      provider: GKE_AUTOPILOT
      fluentBit:
        persistence:
          mode: hostPath
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FB_DB
            value: /var/log/flb_kube.db
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /var/log
        template: templates/daemonset.yaml
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /var/log
            readOnly: true
        template: templates/daemonset.yaml

  - it: FARGATE adds node affinity to exclude fargate nodes
    set:
      licenseKey: nr_license_key
      provider: FARGATE
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: eks.amazonaws.com/compute-type
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].operator
          value: NotIn
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: fargate
        template: templates/daemonset.yaml

  - it: FARGATE does not alter linuxMountPath or persistence mode
    set:
      licenseKey: nr_license_key
      provider: FARGATE
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: logs
            mountPath: /var
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: logs
            hostPath:
              path: /var
        template: templates/daemonset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FB_DB
            value: /var/log/flb_kube.db
        template: templates/daemonset.yaml
      - hasDocuments:
          count: 0
        template: templates/persistentvolume.yaml