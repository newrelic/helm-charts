{{- if .Values.nrdotCollector.enabled }}
{{- $direct := eq .Values.nrdotCollector.egressMode "direct" }}
{{- $nsKeys := keys .Values.namespaceLicenseKeys | sortAlpha }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nr-ebpf-agent.nrdot.configName.cluster" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
data:
  cluster.yaml: |
    receivers:
      prometheus/ksm:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              kubernetes_sd_configs: [{role: pod}]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                  action: keep
      prometheus/controlplane:
        config:
          scrape_configs:
            - job_name: apiserver
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              kubernetes_sd_configs:
                - role: endpoints
                  namespaces:
                    names:
                      - default
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
                server_name: kubernetes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                - action: keep
                  source_labels:
                    - __meta_kubernetes_namespace
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
                  regex: default;kubernetes;https
              metric_relabel_configs:
                # kubernetes_build_info -> renamed to k8s.cluster.info downstream
                # (drives KUBERNETESCLUSTER entity synthesis). The rest are the
                # control-plane metrics the canonical chart keeps for the API server.
                - source_labels: [__name__]
                  regex: 'kubernetes_build_info|apiserver_storage_objects|apiserver_request_total|apiserver_current_inflight_requests|go_goroutines|go_threads|process_resident_memory_bytes|process_cpu_seconds_total'
                  action: keep
            # controller-manager and scheduler run on their own secure ports inside
            # kube-system on self-managed clusters. NOTE: on managed control planes
            # (AKS/EKS/GKE) these pods are not visible in the cluster, so role:pod
            # discovery finds zero targets and these jobs are inert there. RBAC is
            # already covered (pods + nonResourceURLs:/metrics). TLS/availability is
            # environment-specific; tune per distribution.
            - job_name: controller-manager
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              metrics_path: /metrics
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - kube-system
              relabel_configs:
                - action: keep
                  source_labels: [__meta_kubernetes_pod_name, __address__]
                  regex: '.*controller-manager.*;.*:10257$'
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'workqueue_.*|leader_election_master_status|node_collector_.*|rest_client_requests_total|go_goroutines|go_threads|process_resident_memory_bytes|process_cpu_seconds_total'
                  action: keep
            - job_name: scheduler
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              metrics_path: /metrics
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - kube-system
              relabel_configs:
                - action: keep
                  source_labels: [__meta_kubernetes_pod_name, __address__]
                  regex: '.*scheduler.*;.*:10259$'
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'scheduler_.*|leader_election_master_status|rest_client_requests_total|go_goroutines|go_threads|process_resident_memory_bytes|process_cpu_seconds_total'
                  action: keep
      k8s_events: {}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      # NOTE: no resourcedetection/cloudproviders here. This is the cluster-scoped
      # Deployment (KSM + events + control-plane) — it does NOT run hostNetwork, so
      # cloud IMDS is unreachable and the EKS detector falls back to its K8s-API path
      # (GetK8sInstanceMetadata), which needs a node name + AWS IAM it doesn't have and
      # crashes the collector ("node name is empty"). Cluster-scoped telemetry is
      # node-agnostic anyway; cloud/host attributes are detected per-node on the
      # DaemonSet sidecar. Matches nr-k8s-otel-collector (no resourcedetection on its
      # cluster Deployment). k8s.cluster.name comes from resource/newrelic (CLUSTER_NAME).
      resource/drop_scrape_meta:
        attributes:
          - { key: service.name, action: delete }
          - { key: service.instance.id, action: delete }
          - { key: server.address, action: delete }
          - { key: server.port, action: delete }
          - { key: url.scheme, action: delete }
          - { key: net.host.name, action: delete }
          - { key: net.host.port, action: delete }
          - { key: http.scheme, action: delete }
      metricstransform/kube_pod_container_status_phase:
        transforms:
          - include: kube_pod_container_status_waiting
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: waiting }]
          - include: kube_pod_container_status_running
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: running }]
          - include: kube_pod_container_status_terminated
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: terminated }]
      metricstransform/k8s_cluster_info:
        transforms:
          - include: kubernetes_build_info
            action: update
            new_name: k8s.cluster.info
      filter/exclude_zero_value_kube_node_status_condition:
        metrics:
          datapoint:
            - metric.name == "kube_node_status_condition" and value_double == 0.0
      filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase:
        metrics:
          datapoint:
            - metric.name == "kube_persistentvolumeclaim_status_phase" and value_double == 0.0
      filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses:
        metrics:
          datapoint:
            - metric.name == "kube_pod_status_phase" and value_double == 0.0
            - metric.name == "kube_pod_status_ready" and value_double == 0.0
            - metric.name == "kube_pod_status_scheduled" and value_double == 0.0
            - metric.name == "kube_pod_container_status_phase" and value_double == 0.0
            - metric.name == "kube_deployment_status_condition" and value_double == 0.0
      filter/nr_exclude_zero_value_kube_jobs:
        metrics:
          datapoint:
            - metric.name == "kube_job_complete" and value_double == 0.0
      transform/convert_timestamp:
        metric_statements:
          - context: datapoint
            conditions:
              - IsMatch(metric.name, "kube_pod_container_status_last_terminated_timestamp")
            statements:
              - set(datapoint.attributes["kube_pod_container_status_last_terminated_timestamp_formatted"], FormatTime(Unix(Int(datapoint.value_double)), "%Y-%m-%dT%H:%M:%SZ"))
      # Normalize the KSM container_id label ("containerd://<id>") into a bare
      # container_id plus a separate runtime attribute -- parity with the canonical
      # nr-k8s-otel-collector chart. kubeletstats already emits a bare container.id;
      # only the KSM kube_pod_container_info container_id carries the runtime prefix.
      # error_mode: ignore keeps the IsMatch guard safe on datapoints without the label.
      transform/extract_runtime:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            conditions:
              - IsMatch(datapoint.attributes["container_id"], ".*://.*")
            statements:
              - set(datapoint.attributes["runtime"], Split(datapoint.attributes["container_id"], "://")[0])
              - set(datapoint.attributes["container_id"], Split(datapoint.attributes["container_id"], "://")[1])
      resource/newrelic:
        attributes:
          - key: k8s.cluster.name
            value: ${env:CLUSTER_NAME}
            action: upsert
          - key: newrelic.entity.type
            value: "k8s"
            action: upsert
      # K8s events typing (canonical nr-k8s-otel-collector parity). Without
      # newrelic.event.type=OtlpInfrastructureEvent, k8s_events land as generic
      # logs rather than registering as infrastructure events (nri-kube-events
      # parity). transform/events stamps the originating node as event.source.host.
      resource/events:
        attributes:
          - key: newrelic.event.type
            value: "OtlpInfrastructureEvent"
            action: upsert
          - key: category
            value: "kubernetes"
            action: upsert
      transform/events:
        log_statements:
          - context: log
            statements:
              - set(log.attributes["event.source.host"], resource.attributes["k8s.node.name"])
      groupbyattrs:
        keys:
          - pod
          - uid
          - container
          - daemonset
          - replicaset
          - replicationcontroller
          - statefulset
          - deployment
          - cronjob
          - configmap
          - job
          - job_name
          - horizontalpodautoscaler
          - persistentvolume
          - persistentvolumeclaim
          - endpoint
          - mutatingwebhookconfiguration
          - validatingwebhookconfiguration
          - lease
          - storageclass
          - secret
          - service
          - resourcequota
          - node
          - namespace
      transform/ksm:
        metric_statements:
          - delete_key(resource.attributes, "k8s.pod.uid")
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.node.name")
          - delete_key(resource.attributes, "k8s.deployment.name")
          - delete_key(resource.attributes, "k8s.replicaset.name")
          - delete_key(resource.attributes, "k8s.statefulset.name")
          - delete_key(resource.attributes, "k8s.daemonset.name")
          - delete_key(resource.attributes, "k8s.replicationcontroller.name")
          - delete_key(resource.attributes, "k8s.job.name")
          - delete_key(resource.attributes, "k8s.cronjob.name")
          - delete_key(resource.attributes, "k8s.hpa.name")
          - delete_key(resource.attributes, "k8s.resourcequota.name")
          - delete_key(resource.attributes, "k8s.volume.name")
          - delete_key(resource.attributes, "k8s.pvc.name")
          - set(resource.attributes["k8s.pod.uid"], resource.attributes["uid"])
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - set(resource.attributes["k8s.deployment.name"], resource.attributes["deployment"])
          - set(resource.attributes["k8s.replicaset.name"], resource.attributes["replicaset"])
          - set(resource.attributes["k8s.statefulset.name"], resource.attributes["statefulset"])
          - set(resource.attributes["k8s.daemonset.name"], resource.attributes["daemonset"])
          - set(resource.attributes["k8s.replicationcontroller.name"], resource.attributes["replicationcontroller"])
          - set(resource.attributes["k8s.job.name"], resource.attributes["job_name"])
          - set(resource.attributes["k8s.cronjob.name"], resource.attributes["cronjob"])
          - set(resource.attributes["k8s.hpa.name"], resource.attributes["horizontalpodautoscaler"])
          - set(resource.attributes["k8s.resourcequota.name"], resource.attributes["resourcequota"])
          - set(resource.attributes["k8s.volume.name"], resource.attributes["persistentvolume"])
          - set(resource.attributes["k8s.pvc.name"], resource.attributes["persistentvolumeclaim"])
          - delete_key(resource.attributes, "uid")
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "node")
          - delete_key(resource.attributes, "deployment")
          - delete_key(resource.attributes, "replicaset")
          - delete_key(resource.attributes, "statefulset")
          - delete_key(resource.attributes, "daemonset")
          - delete_key(resource.attributes, "replicationcontroller")
          - delete_key(resource.attributes, "job_name")
          - delete_key(resource.attributes, "cronjob")
          - delete_key(resource.attributes, "horizontalpodautoscaler")
          - delete_key(resource.attributes, "resourcequota")
          - delete_key(resource.attributes, "persistentvolume")
          - delete_key(resource.attributes, "persistentvolumeclaim")
      transform/ksm_datapoints:
        metric_statements:
          - set(resource.attributes["k8s.volume.name"], datapoint.attributes["volumename"])
          - delete_key(datapoint.attributes, "volumename")
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources:
            - { from: resource_attribute, name: k8s.pod.name }
            - { from: resource_attribute, name: k8s.namespace.name }
      cumulativetodelta:
        exclude:
          metrics: [kube_pod_container_status_restarts_total]
          match_type: strict
      batch:
        send_batch_size: 800
        send_batch_max_size: 1000
        timeout: {{ .Values.nrdotCollector.collectionInterval }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    {{- if $direct }}
    {{- if $nsKeys }}
    connectors:
      routing:
        error_mode: ignore
        default_pipelines: [metrics/acct-default]
        table:
        {{- range $i, $ns := $nsKeys }}
          - context: resource
            condition: attributes["k8s.namespace.name"] == {{ $ns | quote }}
            pipelines: [metrics/acct-{{ $i }}]
        {{- end }}
    {{- end }}
    exporters:
      otlphttp/acct-default:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NEW_RELIC_LICENSE_KEY}"}
        compression: gzip
    {{- range $i, $ns := $nsKeys }}
      otlphttp/acct-{{ $i }}:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NR_INGEST_KEY_{{ $i }}}"}
        compression: gzip
    {{- end }}
    service:
      extensions: [health_check]
      pipelines:
        metrics/in:
          receivers: [prometheus/ksm]
          processors: [memory_limiter, resource/drop_scrape_meta, metricstransform/kube_pod_container_status_phase, metricstransform/k8s_cluster_info, filter/exclude_zero_value_kube_node_status_condition, filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase, filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses, filter/nr_exclude_zero_value_kube_jobs, transform/convert_timestamp, transform/extract_runtime, resource/newrelic, groupbyattrs, transform/ksm, transform/ksm_datapoints, k8sattributes, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        metrics/controlplane:
          receivers: [prometheus/controlplane]
          processors: [memory_limiter, metricstransform/k8s_cluster_info, resource/newrelic, batch]
          exporters: [otlphttp/acct-default]
        {{- if $nsKeys }}
        metrics/acct-default:
          receivers: [routing]
          exporters: [otlphttp/acct-default]
        {{- range $i, $ns := $nsKeys }}
        metrics/acct-{{ $i }}:
          receivers: [routing]
          exporters: [otlphttp/acct-{{ $i }}]
        {{- end }}
        {{- end }}
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, k8sattributes, transform/events, resource/events, resource/newrelic, batch]
          exporters: [otlphttp/acct-default]
    {{- else }}
    exporters:
      otlp/agent:
        endpoint: ${env:AGENT_OTLP_ENDPOINT}
        tls:
          insecure: true
        compression: gzip
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus/ksm]
          processors: [memory_limiter, resource/drop_scrape_meta, metricstransform/kube_pod_container_status_phase, metricstransform/k8s_cluster_info, filter/exclude_zero_value_kube_node_status_condition, filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase, filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses, filter/nr_exclude_zero_value_kube_jobs, transform/convert_timestamp, transform/extract_runtime, resource/newrelic, groupbyattrs, transform/ksm, transform/ksm_datapoints, k8sattributes, cumulativetodelta, batch]
          exporters: [otlp/agent]
        metrics/controlplane:
          receivers: [prometheus/controlplane]
          processors: [memory_limiter, metricstransform/k8s_cluster_info, resource/newrelic, batch]
          exporters: [otlp/agent]
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, k8sattributes, transform/events, resource/events, resource/newrelic, batch]
          exporters: [otlp/agent]
    {{- end }}
{{- end }}
