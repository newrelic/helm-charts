{{- if .Values.nrdotCollector.enabled }}
{{- $direct := eq .Values.nrdotCollector.egressMode "direct" }}
{{- $nsKeys := keys .Values.namespaceLicenseKeys | sortAlpha }}
# =============================================================================
# nrdot collector config — AUTO-GENERATED from values.
#   Customer input: `namespaceLicenseKeys` + `nrdotCollector.egressMode`.
#   egressMode=agent  -> single `otlp/agent` exporter; the eBPF agent routes.
#   egressMode=direct -> routingconnector + per-account otlphttp exporters.
# Two roles share this ConfigMap: pernode.yaml (kubeletstats, mounted by the
# sidecar) and cluster.yaml (KSM + events, mounted by the Deployment).
#
# The KSM (cluster.yaml) processor chain is ported from the nri-kubernetes-parity
# PoC: it renames raw KSM Prometheus labels to OTel semantic conventions and
# drops zero-value noise so the data synthesizes the correct New Relic K8s
# entities. kubeletstats (pernode.yaml) needs none of this — its receiver already
# emits k8s.* resource attributes.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nr-ebpf-agent.nrdot.configName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
data:
  # ----- Per-node collector (DaemonSet sidecar): kubelet metrics -----
  pernode.yaml: |
    receivers:
      kubeletstats:
        collection_interval: {{ .Values.nrdotCollector.collectionInterval }}
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups: [node, pod, container, volume]
        extra_metadata_labels: [container.id]
      # cAdvisor (ported from PoC, ON) — container CPU/mem/net/fs raw counters that
      # complement kubeletstats. Scraped via the API-server proxy using nodes/proxy
      # RBAC (no extra kubelet access). $${1} escapes OTel env-expansion so Prometheus
      # gets the ${1} capture group; ${env:K8S_NODE_NAME} scopes to this node.
      prometheus/cadvisor:
        config:
          scrape_configs:
            - job_name: cadvisor
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
                server_name: kubernetes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - replacement: kubernetes.default.svc.cluster.local:443
                  target_label: __address__
                - regex: (.+)
                  replacement: /api/v1/nodes/$${1}/proxy/metrics/cadvisor
                  source_labels: [__meta_kubernetes_node_name]
                  target_label: __metrics_path__
                - source_labels: [__meta_kubernetes_node_name]
                  regex: ${env:K8S_NODE_NAME}
                  action: keep
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'container_(cpu_usage_seconds_total|memory_working_set_bytes|memory_usage_bytes|network_receive_bytes_total|network_transmit_bytes_total|network_receive_errors_total|network_transmit_errors_total|fs_usage_bytes|fs_capacity_bytes|spec_memory_limit_bytes)'
                  action: keep
                - source_labels: [__name__, container]
                  regex: 'container_(cpu|memory|fs|spec).*;$'
                  action: drop
                - source_labels: [container]
                  regex: 'POD'
                  action: drop
                - source_labels: [interface]
                  regex: 'lo'
                  action: drop
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      # kubeletstats already sets k8s.* resource attrs; enrich with workload metadata.
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.replicaset.name
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.ip }]
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources: [{ from: connection }]
      resourcedetection/cloudproviders:
        detectors: [gcp, eks, ec2, aks, azure]
        timeout: 2s
        override: false
      resource/newrelic:
        attributes:
          # Block style (not flow `{ }`) — an unquoted ${env:...} contains a `}`
          # that would prematurely close a flow mapping and break YAML parsing.
          - key: k8s.cluster.name
            value: ${env:CLUSTER_NAME}
            action: upsert
          - key: newrelic.entity.type
            value: "k8s"
            action: upsert
      # --- cAdvisor processing (ported from PoC) — used by the metrics/cadvisor pipeline ---
      resource/drop_scrape_meta:
        attributes:
          - { key: service.name, action: delete }
          - { key: service.instance.id, action: delete }
          - { key: server.address, action: delete }
          - { key: server.port, action: delete }
          - { key: url.scheme, action: delete }
          - { key: net.host.name, action: delete }
          - { key: net.host.port, action: delete }
          - { key: http.scheme, action: delete }
      # Promote cAdvisor Prometheus labels datapoint -> resource for the rename below.
      groupbyattrs:
        keys: [pod, namespace, container, node, image]
      transform/cadvisor_attrs:
        metric_statements:
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.node.name")
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "node")
      k8sattributes/cadvisor:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.replicaset.name
        pod_association:
          - sources:
            - { from: resource_attribute, name: k8s.pod.name }
            - { from: resource_attribute, name: k8s.namespace.name }
      cumulativetodelta: {}
      batch:
        send_batch_size: 800
        send_batch_max_size: 1000
        timeout: {{ .Values.nrdotCollector.collectionInterval }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    {{- if $direct }}
    {{- if $nsKeys }}
    # Per-namespace routing only when namespace->account mappings exist. With no
    # mappings, all data goes to the default account directly (a routingconnector
    # with an empty table is invalid), so the connector is omitted below.
    connectors:
      routing:
        error_mode: ignore
        default_pipelines: [metrics/acct-default]
        table:
        {{- range $i, $ns := $nsKeys }}
          - context: resource
            condition: attributes["k8s.namespace.name"] == {{ $ns | quote }}
            pipelines: [metrics/acct-{{ $i }}]
        {{- end }}
    {{- end }}
    exporters:
      otlphttp/acct-default:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NEW_RELIC_LICENSE_KEY}"}
        compression: gzip
    {{- range $i, $ns := $nsKeys }}
      otlphttp/acct-{{ $i }}:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NR_INGEST_KEY_{{ $i }}}"}
        compression: gzip
    {{- end }}
    service:
      extensions: [health_check]
      pipelines:
        metrics/in:
          receivers: [kubeletstats]
          processors: [memory_limiter, k8sattributes, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        metrics/cadvisor:
          receivers: [prometheus/cadvisor]
          processors: [memory_limiter, resource/drop_scrape_meta, groupbyattrs, transform/cadvisor_attrs, resourcedetection/cloudproviders, resource/newrelic, k8sattributes/cadvisor, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        {{- if $nsKeys }}
        metrics/acct-default:
          receivers: [routing]
          exporters: [otlphttp/acct-default]
        {{- range $i, $ns := $nsKeys }}
        metrics/acct-{{ $i }}:
          receivers: [routing]
          exporters: [otlphttp/acct-{{ $i }}]
        {{- end }}
        {{- end }}
    {{- else }}
    exporters:
      otlp/agent:
        endpoint: ${env:AGENT_OTLP_ENDPOINT}
        tls:
          insecure: true
        compression: gzip
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [kubeletstats]
          processors: [memory_limiter, k8sattributes, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
          exporters: [otlp/agent]
        metrics/cadvisor:
          receivers: [prometheus/cadvisor]
          processors: [memory_limiter, resource/drop_scrape_meta, groupbyattrs, transform/cadvisor_attrs, resourcedetection/cloudproviders, resource/newrelic, k8sattributes/cadvisor, cumulativetodelta, batch]
          exporters: [otlp/agent]
    {{- end }}

  # ----- Cluster collector (Deployment, 1 replica): KSM + events + controlplane -----
  cluster.yaml: |
    receivers:
      prometheus/ksm:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              kubernetes_sd_configs: [{role: pod}]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                  action: keep
      prometheus/controlplane:
        config:
          scrape_configs:
            - job_name: apiserver
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              kubernetes_sd_configs:
                - role: endpoints
                  namespaces:
                    names:
                      - default
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
                server_name: kubernetes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                - action: keep
                  source_labels:
                    - __meta_kubernetes_namespace
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
                  regex: default;kubernetes;https
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'kubernetes_build_info'
                  action: keep
      k8s_events: {}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      # --- KSM parity chain (ported from the nri-kubernetes PoC) ---
      resourcedetection/cloudproviders:
        detectors: [gcp, eks, ec2, aks, azure]
        timeout: 2s
        override: false
      # Strip Prometheus scrape-endpoint metadata (describes the KSM pod, not the entity).
      resource/drop_scrape_meta:
        attributes:
          - { key: service.name, action: delete }
          - { key: service.instance.id, action: delete }
          - { key: server.address, action: delete }
          - { key: server.port, action: delete }
          - { key: url.scheme, action: delete }
          - { key: net.host.name, action: delete }
          - { key: net.host.port, action: delete }
          - { key: http.scheme, action: delete }
      # Merge the 3 container-phase booleans into one metric with a container_phase label.
      metricstransform/kube_pod_container_status_phase:
        transforms:
          - include: kube_pod_container_status_waiting
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: waiting }]
          - include: kube_pod_container_status_running
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: running }]
          - include: kube_pod_container_status_terminated
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations: [{ action: add_label, new_label: container_phase, new_value: terminated }]
      metricstransform/k8s_cluster_info:
        transforms:
          - include: kubernetes_build_info
            action: update
            new_name: k8s.cluster.info
      # Drop zero-value "false-state" datapoints (noise + ingest cost).
      filter/exclude_zero_value_kube_node_status_condition:
        metrics:
          datapoint:
            - metric.name == "kube_node_status_condition" and value_double == 0.0
      filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase:
        metrics:
          datapoint:
            - metric.name == "kube_persistentvolumeclaim_status_phase" and value_double == 0.0
      filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses:
        metrics:
          datapoint:
            - metric.name == "kube_pod_status_phase" and value_double == 0.0
            - metric.name == "kube_pod_status_ready" and value_double == 0.0
            - metric.name == "kube_pod_status_scheduled" and value_double == 0.0
            - metric.name == "kube_pod_container_status_phase" and value_double == 0.0
            - metric.name == "kube_deployment_status_condition" and value_double == 0.0
      filter/nr_exclude_zero_value_kube_jobs:
        metrics:
          datapoint:
            - metric.name == "kube_job_complete" and value_double == 0.0
      # Format the container last-terminated Unix timestamp into an ISO-8601 string
      # attribute (parity with nri-kubernetes' lastTerminatedTimestamp). Ported from PoC.
      transform/convert_timestamp:
        metric_statements:
          - context: datapoint
            conditions:
              - IsMatch(metric.name, "kube_pod_container_status_last_terminated_timestamp")
            statements:
              - set(datapoint.attributes["kube_pod_container_status_last_terminated_timestamp_formatted"], FormatTime(Unix(Int(datapoint.value_double)), "%Y-%m-%dT%H:%M:%SZ"))
      resource/newrelic:
        attributes:
          # Block style (not flow `{ }`) — an unquoted ${env:...} contains a `}`
          # that would prematurely close a flow mapping and break YAML parsing.
          - key: k8s.cluster.name
            value: ${env:CLUSTER_NAME}
            action: upsert
          - key: newrelic.entity.type
            value: "k8s"
            action: upsert
      # Promote raw KSM Prometheus labels from datapoint -> resource so the rename below
      # operates on the monitored entity. (Replaces the earlier namespace-only promotion.)
      groupbyattrs:
        keys:
          - pod
          - uid
          - container
          - daemonset
          - replicaset
          - statefulset
          - deployment
          - cronjob
          - job
          - job_name
          - horizontalpodautoscaler
          - persistentvolume
          - persistentvolumeclaim
          - endpoint
          - service
          - resourcequota
          - node
          - namespace
      # Rename raw KSM labels -> OTel semantic conventions. MUST run after groupbyattrs
      # and before k8sattributes. (Verbatim from the PoC; OTTL flat form — verify the
      # transform syntax on first deploy, like the routingconnector/telemetry forms.)
      transform/ksm:
        metric_statements:
          - delete_key(resource.attributes, "k8s.pod.uid")
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.node.name")
          - delete_key(resource.attributes, "k8s.deployment.name")
          - delete_key(resource.attributes, "k8s.replicaset.name")
          - delete_key(resource.attributes, "k8s.statefulset.name")
          - delete_key(resource.attributes, "k8s.daemonset.name")
          - delete_key(resource.attributes, "k8s.job.name")
          - delete_key(resource.attributes, "k8s.cronjob.name")
          - delete_key(resource.attributes, "k8s.hpa.name")
          - delete_key(resource.attributes, "k8s.resourcequota.name")
          - delete_key(resource.attributes, "k8s.volume.name")
          - delete_key(resource.attributes, "k8s.pvc.name")
          - set(resource.attributes["k8s.pod.uid"], resource.attributes["uid"])
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - set(resource.attributes["k8s.deployment.name"], resource.attributes["deployment"])
          - set(resource.attributes["k8s.replicaset.name"], resource.attributes["replicaset"])
          - set(resource.attributes["k8s.statefulset.name"], resource.attributes["statefulset"])
          - set(resource.attributes["k8s.daemonset.name"], resource.attributes["daemonset"])
          - set(resource.attributes["k8s.job.name"], resource.attributes["job_name"])
          - set(resource.attributes["k8s.cronjob.name"], resource.attributes["cronjob"])
          - set(resource.attributes["k8s.hpa.name"], resource.attributes["horizontalpodautoscaler"])
          - set(resource.attributes["k8s.resourcequota.name"], resource.attributes["resourcequota"])
          - set(resource.attributes["k8s.volume.name"], resource.attributes["persistentvolume"])
          - set(resource.attributes["k8s.pvc.name"], resource.attributes["persistentvolumeclaim"])
          - delete_key(resource.attributes, "uid")
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "node")
          - delete_key(resource.attributes, "deployment")
          - delete_key(resource.attributes, "replicaset")
          - delete_key(resource.attributes, "statefulset")
          - delete_key(resource.attributes, "daemonset")
          - delete_key(resource.attributes, "job_name")
          - delete_key(resource.attributes, "cronjob")
          - delete_key(resource.attributes, "horizontalpodautoscaler")
          - delete_key(resource.attributes, "resourcequota")
          - delete_key(resource.attributes, "persistentvolume")
          - delete_key(resource.attributes, "persistentvolumeclaim")
      # Some KSM volume metrics carry volumename as a datapoint attr; promote it.
      transform/ksm_datapoints:
        metric_statements:
          - set(resource.attributes["k8s.volume.name"], datapoint.attributes["volumename"])
          - delete_key(datapoint.attributes, "volumename")
      # k8s.* now refer to the monitored entity, so k8sattributes can enrich from the API.
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources:
            - { from: resource_attribute, name: k8s.pod.name }
            - { from: resource_attribute, name: k8s.namespace.name }
      cumulativetodelta:
        exclude:
          metrics: [kube_pod_container_status_restarts_total]
          match_type: strict
      batch:
        send_batch_size: 800
        send_batch_max_size: 1000
        timeout: {{ .Values.nrdotCollector.collectionInterval }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    {{- if $direct }}
    {{- if $nsKeys }}
    # Per-namespace routing only when namespace->account mappings exist. With no
    # mappings, all data goes to the default account directly (a routingconnector
    # with an empty table is invalid), so the connector is omitted below.
    connectors:
      routing:
        error_mode: ignore
        default_pipelines: [metrics/acct-default]
        table:
        {{- range $i, $ns := $nsKeys }}
          - context: resource
            condition: attributes["k8s.namespace.name"] == {{ $ns | quote }}
            pipelines: [metrics/acct-{{ $i }}]
        {{- end }}
    {{- end }}
    exporters:
      otlphttp/acct-default:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NEW_RELIC_LICENSE_KEY}"}
        compression: gzip
    {{- range $i, $ns := $nsKeys }}
      otlphttp/acct-{{ $i }}:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NR_INGEST_KEY_{{ $i }}}"}
        compression: gzip
    {{- end }}
    service:
      extensions: [health_check]
      pipelines:
        metrics/in:
          receivers: [prometheus/ksm]
          processors: [memory_limiter, resource/drop_scrape_meta, metricstransform/kube_pod_container_status_phase, metricstransform/k8s_cluster_info, filter/exclude_zero_value_kube_node_status_condition, filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase, filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses, filter/nr_exclude_zero_value_kube_jobs, transform/convert_timestamp, resource/newrelic, groupbyattrs, transform/ksm, transform/ksm_datapoints, k8sattributes, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        metrics/controlplane:
          receivers: [prometheus/controlplane]
          processors: [memory_limiter, metricstransform/k8s_cluster_info, resourcedetection/cloudproviders, resource/newrelic, batch]
          exporters: [otlphttp/acct-default]
        {{- if $nsKeys }}
        metrics/acct-default:
          receivers: [routing]
          exporters: [otlphttp/acct-default]
        {{- range $i, $ns := $nsKeys }}
        metrics/acct-{{ $i }}:
          receivers: [routing]
          exporters: [otlphttp/acct-{{ $i }}]
        {{- end }}
        {{- end }}
        # v1: K8s events (logs) -> default account (per-namespace event routing is a follow-up).
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, k8sattributes, resource/newrelic, batch]
          exporters: [otlphttp/acct-default]
    {{- else }}
    exporters:
      otlp/agent:
        endpoint: ${env:AGENT_OTLP_ENDPOINT}
        tls:
          insecure: true
        compression: gzip
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [prometheus/ksm]
          processors: [memory_limiter, resource/drop_scrape_meta, metricstransform/kube_pod_container_status_phase, metricstransform/k8s_cluster_info, filter/exclude_zero_value_kube_node_status_condition, filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase, filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses, filter/nr_exclude_zero_value_kube_jobs, transform/convert_timestamp, resource/newrelic, groupbyattrs, transform/ksm, transform/ksm_datapoints, k8sattributes, cumulativetodelta, batch]
          exporters: [otlp/agent]
        metrics/controlplane:
          receivers: [prometheus/controlplane]
          processors: [memory_limiter, metricstransform/k8s_cluster_info, resourcedetection/cloudproviders, resource/newrelic, batch]
          exporters: [otlp/agent]
        logs:
          receivers: [k8s_events]
          processors: [memory_limiter, k8sattributes, resource/newrelic, batch]
          exporters: [otlp/agent]
    {{- end }}
{{- end }}
