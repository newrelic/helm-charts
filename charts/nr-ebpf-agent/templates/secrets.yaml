---
{{- $licenseKey := include "newrelic.common.license._licenseKey" . }}
{{- $customSecretLicenseKey := include "newrelic.common.license._customSecretKey" . }}
apiVersion: v1
kind: Secret
metadata:
  name: nr-ebpf-agent-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.licenseKey}}
  NEW_RELIC_LICENSE_KEY: {{ .Values.licenseKey | b64enc }}
  {{- else if $licenseKey}}
  NEW_RELIC_LICENSE_KEY: {{ $licenseKey | b64enc }}
  {{ else if $customSecretLicenseKey}}
  NEW_RELIC_LICENSE_KEY: ""
  {{- else }}
  NEW_RELIC_LICENSE_KEY: {{ required "secrets.licenseKey is required" .Values.licenseKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.namespaceLicenseKeys }}
  # Namespace -> license key map for the eBPF agent's multi-account routing.
  # base64(JSON); k8s decodes the Secret value so the agent env receives raw JSON,
  # which InitNamespaceLicenseKeyMap() accepts.
  NAMESPACE_LICENSE_KEY_MAP: {{ .Values.namespaceLicenseKeys | toJson | b64enc }}
  {{- if and .Values.nrdotCollector.enabled (eq .Values.nrdotCollector.egressMode "direct") }}
  # Per-account keys for nrdot's direct-mode exporters. Index-aligned (sorted
  # namespaces) with the generated routing config: NR_INGEST_KEY_<i> is the key
  # for the i-th namespace. Only emitted in direct mode (agent mode needs no keys in nrdot).
  {{- range $i, $ns := (keys .Values.namespaceLicenseKeys | sortAlpha) }}
  NR_INGEST_KEY_{{ $i }}: {{ index $.Values.namespaceLicenseKeys $ns | b64enc }}
  {{- end }}
  {{- end }}
  {{- end }}
