---
{{- if or (and .Values.customOtlpEndpointTlsCertSecret (not .Values.customOtlpEndpointTlsCertSecretKey)) (and (not .Values.customOtlpEndpointTlsCertSecret) .Values.customOtlpEndpointTlsCertSecretKey) }}
  {{- fail "Both customOtlpEndpointTlsCertSecret and customOtlpEndpointTlsCertSecretKey must be provided together." }}
{{- end }}
{{- if and .Values.customOtlpEndpointTlsCertSecret (not .Values.customOtlpEndpoint) }}
  {{- fail "customOtlpEndpointTlsCertSecret is set but customOtlpEndpoint is not provided. Please provide a customOtlpEndpoint or remove the TLS cert configuration." }}
{{- end }}
{{- $region := include "newrelic.common.region" . }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nr-ebpf-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: nr-ebpf-agent
    component: agent
    {{- include "newrelic.common.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "newrelic.common.labels.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: nr-ebpf-agent
        component: agent
        {{- include "newrelic.common.labels.podLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- if .Values.nrdotCollector.enabled }}
        # Roll the DaemonSet (and its nrdot sidecar) when the nrdot config changes.
        checksum/nrdot-config: {{ include (print $.Template.BasePath "/nr-ebpf-agent-nrdot-config-pernode.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.ebpfAgent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with include "nrEbpfAgent.ebpfAgent.securityContext.pod" . }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "newrelic.common.priorityClassName" . }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with include "nr-ebpf-agent.imagePullSecrets" . }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "newrelic.common.dnsConfig" . }}
      dnsConfig:
        {{- . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: kernel-header-installer
        image: {{ include "nr-ebpf-agent.initContainerImage" . }}
        imagePullPolicy: {{ include "nr-ebpf-agent.kernelHeaderInstaller.imagePullPolicy" . }}
        command: ["/scripts/install-headers.sh"]
        securityContext:
          privileged: true
        volumeMounts:
        - name: installer-script
          mountPath: /scripts
          readOnly: true
        - name: host-root-volume
          mountPath: /host
        - name: kernel-headers-volume
          mountPath: /kernel-headers
      {{- if .Values.nrdotCollector.enabled }}
      # Reads this node's CPU/memory allocatable from the K8s API and patches the
      # nrdot config's metricsgeneration/calculate_percentage scale_by fields, so
      # node.cpu.usage.percentage / node.memory.usage.percentage can be computed
      # (these power the K8s cluster CPU/memory usage view). The collector image
      # is locked down and can't query the API itself, and the downward API does
      # not expose node allocatable — hence this init container (mirrors the
      # nr-k8s-otel-collector chart's get-cpu-allocatable container).
      - name: nrdot-get-allocatable
        image: {{ include "nr-ebpf-agent.nrdot.kubectlImage" . }}
        imagePullPolicy: {{ include "nr-ebpf-agent.nrdot.kubectlImagePullPolicy" . }}
        command:
          - sh
          - -c
          - |
            NODE_NAME=$(echo $KUBE_NODE_NAME)
            echo "Node Name: $KUBE_NODE_NAME"

            export NODE_CPU_ALLOCATABLE=$(kubectl get node $NODE_NAME -o jsonpath='{.status.allocatable.cpu}')

            if [[ -z "NODE_CPU_ALLOCATABLE" ]] || [[ "NODE_CPU_ALLOCATABLE" == "0" ]]; then
              echo "Could not retrieve CPU allocatable for node $NODE_NAME"
              exit 1
            fi

            # Convert milliCPU values to plain CPU values
            if [[ $NODE_CPU_ALLOCATABLE == *m ]]; then
              # Strip the 'm' and convert the milliCPUs to CPUs
              export NODE_CPU_ALLOCATABLE=$(awk "BEGIN {print ${NODE_CPU_ALLOCATABLE%?} / 1000}")
            fi

            export NODE_MEMORY_ALLOCATABLE=$(kubectl get node $NODE_NAME -o jsonpath='{.status.allocatable.memory}' | awk '
              /Ki$/ {printf "%.0f\n", $1 * 1024; next}
              /Mi$/ {printf "%.0f\n", $1 * 1024^2; next}
              /Gi$/ {printf "%.0f\n", $1 * 1024^3; next}
              /m$/  {printf "%.0f\n", $1 / 1000; next}
              {print $1}
            ')

            if [[ -z "NODE_MEMORY_ALLOCATABLE" ]] || [[ "NODE_MEMORY_ALLOCATABLE" == "0" ]]; then
              echo "Could not retrieve Memory allocatable for node $NODE_NAME"
              exit 1
            fi

            echo "NODE_CPU_ALLOCATABLE : $NODE_CPU_ALLOCATABLE"
            echo "NODE_MEMORY_ALLOCATABLE : $NODE_MEMORY_ALLOCATABLE"
            cp /temp-config/pernode.yaml /final-config
            yq -i '(.processors.metricsgeneration/calculate_percentage.rules[] | select(.name == "node.cpu.usage.percentage").scale_by) = env(NODE_CPU_ALLOCATABLE)' /final-config/pernode.yaml
            yq -i '(.processors.metricsgeneration/calculate_percentage.rules[] | select(.name == "node.memory.usage.percentage").scale_by) = env(NODE_MEMORY_ALLOCATABLE)' /final-config/pernode.yaml
            cat /final-config/pernode.yaml
        env:
          - name: KUBE_NODE_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: spec.nodeName
        volumeMounts:
          - name: nrdot-config
            mountPath: /temp-config
          - name: nrdot-config-final
            mountPath: /final-config
      {{- end }}

      containers:
      - name: nr-ebpf-agent
        image: {{ include "nr-ebpf-agent.ebpfAgent.image" . }}
        imagePullPolicy: {{ include "nr-ebpf-agent.ebpfAgent.imagePullPolicy" . }}
        resources: {{ .Values.ebpfAgent.resources | toYaml | nindent 10 }}
        env:
          - name: PL_HOST_PATH
            value: "/host"
          - name: PL_STIRLING_SOURCES
            value: "{{ .Values.stirlingSources | default "socket_tracer,tcp_stats" }}"
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: "cluster.local"
          - name: NEW_RELIC_LOG_LEVEL
            value: "{{ include "nr-ebpf-agent.logLevel" . }}"
          - name: NEW_RELIC_LOG_FILE_PATH
            value: "{{ .Values.logFilePath }}"
          {{- if .Values.entityLabels }}
          - name: NEW_RELIC_LABELS
            value: "{{- $labels := list -}}{{- range $key, $value := .Values.entityLabels -}}{{- $labels = append $labels (printf "%s:%s" $key $value) -}}{{- end -}}{{ join ";" $labels }}"
          {{- end }}
          - name: NEW_RELIC_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                {{- if (include "newrelic.common.license._licenseKey" .) }}
                key: NEW_RELIC_LICENSE_KEY
                name: nr-ebpf-agent-secrets
                {{- else }}
                key: {{ include "newrelic.common.license._customSecretKey" . }}
                name: {{ include "newrelic.common.license._customSecretName" . }}
                {{- end }}

          {{- if .Values.tableStoreDataLimitMB }}
          - name: TABLE_STORE_DATA_LIMIT_MB
            value: "{{ .Values.tableStoreDataLimitMB }}"
          {{- end }}

          {{- if .Values.ebpfAgent.downloadedPackagedHeadersPath }}
          - name: DOWNLOADED_PACKAGED_HEADERS_PATH
            value: "{{ .Values.ebpfAgent.downloadedPackagedHeadersPath }}"
          {{- end }}

          {{- if .Values.ebpfAgent.distroKernelHeadersPath }}
          - name: DISTRO_KERNEL_HEADERS_PATH
            value: "{{ .Values.ebpfAgent.distroKernelHeadersPath }}"
          {{- end }}
          - name: DEPLOYMENT_NAME
            value: {{ if .Values.global }}{{ .Values.global.cluster | default .Values.cluster }}{{ else }}{{ .Values.cluster }}{{ end }}
          - name: HOST_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: OTLP_ENDPOINT
            value: {{ include "newrelic.common.otlp_endpoint" . | trimPrefix "https://" }}:443
          {{- if .Values.namespaceLicenseKeys }}
          # Multi-account routing map (drives routing of the agent's OWN data, and
          # of ingested nrdot data in agent egress mode).
          - name: NAMESPACE_LICENSE_KEY_MAP
            valueFrom:
              secretKeyRef:
                name: nr-ebpf-agent-secrets
                key: NAMESPACE_LICENSE_KEY_MAP
          {{- end }}
          {{- if and .Values.nrdotCollector.enabled (eq .Values.nrdotCollector.egressMode "agent") }}
          # Turn on the inbound OTLP receiver so the nrdot sidecar/Deployment can
          # send infra telemetry through the agent (single egress).
          - name: ENABLE_OTLP_INGEST
            value: "true"
          - name: OTLP_INGEST_PORT
            value: "{{ .Values.nrdotCollector.otlpIngestPort }}"
          {{- end }}
          - name: TLS_ENABLED
            value: '{{ if or (kindIs "invalid" .Values.customOtlpEndpointTlsEnabled) (eq (toString .Values.customOtlpEndpointTlsEnabled) "") }}true{{ else }}{{ .Values.customOtlpEndpointTlsEnabled }}{{ end }}'
        {{- if and .Values.customOtlpEndpointTlsCertSecret .Values.customOtlpEndpointTlsCertSecretKey }}
          - name: TLS_CERT_PATH
            value: "/etc/otlp-tls/{{ .Values.customOtlpEndpointTlsCertSecretKey }}"
        {{- end }}
          {{- include "generateClientScriptEnvVars" . | nindent 10 }}
          {{- if .Values.protocols.global }}
          {{- if (hasKey .Values.protocols.global "max_unlinked_spans") }}
          - name: PROTOCOLS_SPANS_UNLINKED_MAX
            value: "{{ .Values.protocols.global.max_unlinked_spans }}"
          {{- end }}
          {{- end }}
          {{- if (hasKey .Values.protocols.http "spans") }}
          {{- if .Values.protocols.http.spans.samplingErrorRate}}
          {{- include "validate.samplingErrorRate" (dict "protocol" "http" "errorRate" .Values.protocols.http.spans.samplingErrorRate) }}
          - name: PROTOCOLS_HTTP_SPANS_SAMPLING_ERROR_RATE
            value: "{{ .Values.protocols.http.spans.samplingErrorRate | default "0"}}"
          {{- end }}
          {{- end }}
          {{- if (hasKey .Values.protocols.thrift "spans") }}
          {{- if .Values.protocols.thrift.spans.samplingErrorRate}}
          {{- include "validate.samplingErrorRate" (dict "protocol" "thrift" "errorRate" .Values.protocols.thrift.spans.samplingErrorRate) }}
          - name: PROTOCOLS_THRIFT_SPANS_SAMPLING_ERROR_RATE
            value: "{{ .Values.protocols.thrift.spans.samplingErrorRate | default "0"}}"
          {{- end }}
          {{- end }}
          - name: NAMESPACE
            value: {{ .Release.Namespace }}
          - name: AGENT_SERVICE_NAME
            value: {{ include "nr-ebpf-agent.service.name" . }}
          - name: REPORT_APM_DATA
            value: "{{ .Values.reportApmData }}"
          - name: REPORT_NETWORK_METRICS
            value: "{{ .Values.reportNetworkMetrics }}"
          - name: REPORT_LOGS
          {{- if hasKey .Values "reportLogs" }}
            value: "{{ .Values.reportLogs }}"
          {{- else if hasKey .Values "logReporting" }}
            value: "{{ .Values.logReporting }}"
          {{- else }}
            value: "false"
          {{- end }}
          - name: REPORT_AI_METRICS
            value: "{{ if hasKey .Values "reportAiMetrics" }}{{ .Values.reportAiMetrics }}{{ else }}false{{ end }}"
          - name: REPORT_INFRA
            value: "{{ if hasKey .Values "reportInfra" }}{{ .Values.reportInfra }}{{ else }}false{{ end }}"
          - name: GENAI_CAPTURE_MESSAGE_CONTENT
            value: "{{ if hasKey .Values "genAICaptureMessageContent" }}{{ .Values.genAICaptureMessageContent }}{{ else }}false{{ end }}"

          {{- if or .Values.otlpProxy.host .Values.otlpProxy.url }}
          {{- if .Values.otlpProxy.host }}
          - name: NEW_RELIC_PROXY_HOST
            value: "{{ .Values.otlpProxy.host }}"
          - name: NEW_RELIC_PROXY_PORT
            value: "{{ .Values.otlpProxy.port }}"
          - name: NEW_RELIC_PROXY_SCHEME
            value: "{{ .Values.otlpProxy.scheme | default "http" }}"
          {{- end }}
          {{- if .Values.otlpProxy.url }}
          - name: NEW_RELIC_PROXY_URL
            value: "{{ .Values.otlpProxy.url }}"
          {{- end }}
          {{- if .Values.otlpProxy.existingSecret }}
          - name: NEW_RELIC_PROXY_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.otlpProxy.existingSecret }}
                key: proxy-user
          - name: NEW_RELIC_PROXY_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Values.otlpProxy.existingSecret }}
                key: proxy-password
          {{- else if .Values.otlpProxy.user }}
          - name: NEW_RELIC_PROXY_USER
            value: "{{ .Values.otlpProxy.user }}"
          {{- if .Values.otlpProxy.password }}
          - name: NEW_RELIC_PROXY_PASS
            value: "{{ .Values.otlpProxy.password }}"
          {{- end }}
          {{- end }}
          {{- end }}

          # ALL Data filtering configuration
          {{- if .Values.allDataFilters }}
          - name: DROP_ALL_DATA_FOR_NEW_RELIC
            value: "{{ if hasKey .Values.allDataFilters "dropNewRelicBundle" }}{{ .Values.allDataFilters.dropNewRelicBundle }}{{ else }}true{{ end }}"
          - name: DROP_ALL_DATA_FOR_NAMESPACES
            value: "{{ .Values.allDataFilters.dropNamespaces | join "," }}"
          - name: KEEP_ALL_DATA_FOR_NAMESPACES
            value: "{{ .Values.allDataFilters.keepNamespaces | join "," }}"
          - name: DROP_ALL_DATA_FOR_POD_LABELS
            value: "{{ range $key, $value := .Values.allDataFilters.dropPodLabels }}{{ $key }}={{ $value }},{{ end }}"
          - name: KEEP_ALL_DATA_FOR_POD_LABELS
            value: "{{ range $key, $value := .Values.allDataFilters.keepPodLabels }}{{ $key }}={{ $value }},{{ end }}"
          - name: DROP_ALL_DATA_FOR_SERVICE_NAME_REGEX
            value: {{ .Values.allDataFilters.dropServiceNameRegex }}
          - name: KEEP_ALL_DATA_FOR_SERVICE_NAME_REGEX
            value: {{ .Values.allDataFilters.keepServiceNameRegex }}
          - name: DROP_ALL_DATA_FOR_APM_AGENT_ENABLED_ENTITY
            value: "{{ if hasKey .Values.allDataFilters "dropApmAgentEnabledEntity" }}{{ .Values.allDataFilters.dropApmAgentEnabledEntity }}{{ else }}false{{ end }}"
          {{- end }}

          # APM data filtering configuration
          {{- if .Values.apmDataFilters }}
          - name: DROP_APM_DATA_FOR_APM_AGENT_ENABLED_ENTITY
            value: "{{ if hasKey .Values.apmDataFilters "dropEapmForApmEnabledEntity" }}{{ .Values.apmDataFilters.dropEapmForApmEnabledEntity }}{{ else if hasKey .Values.apmDataFilters "apmAgentEnabledEntity" }}{{ .Values.apmDataFilters.apmAgentEnabledEntity }}{{ else }}true{{ end }}"
          {{- if .Values.apmDataFilters.dropPodLabels }}
          - name: DROP_APM_DATA_FOR_POD_LABELS
            value: "{{ range $key, $value := .Values.apmDataFilters.dropPodLabels }}{{ $key }}={{ $value }},{{ end }}"
          {{- end }}
          - name: DROP_APM_DATA_FOR_ENTITY_NAME
            value: "{{ .Values.apmDataFilters.dropEntityName | join "," }}"
          - name: KEEP_APM_DATA_FOR_ENTITY_NAME
            value: "{{ .Values.apmDataFilters.keepEntityName | join "," }}"
          - name: JVM_METRICS_REPORTING
            value: "{{ if hasKey .Values.apmDataFilters "jvmMetricsReporting" }}{{ .Values.apmDataFilters.jvmMetricsReporting }}{{ else }}true{{ end }}"
          {{- end }}

          # Network metrics data filtering configuration
          {{- if .Values.networkMetricsDataFilter }}
          {{- if .Values.networkMetricsDataFilter.dropPodLabels }}
          - name: DROP_NETWORK_METRICS_DATA_FOR_POD_LABELS
            value: "{{ range $key, $value := .Values.networkMetricsDataFilter.dropPodLabels }}{{ $key }}={{ $value }},{{ end }}"
          {{- end }}
          - name: DROP_NETWORK_METRICS_DATA_FOR_ENTITY_NAME
            value: "{{ .Values.networkMetricsDataFilter.dropEntityName | join "," }}"
          - name: KEEP_NETWORK_METRICS_DATA_FOR_ENTITY_NAME
            value: "{{ .Values.networkMetricsDataFilter.keepEntityName | join "," }}"
          {{- end }}

          # Log data filtering configuration
          {{- if .Values.logDataFilters }}
          {{- if .Values.logDataFilters.applicationLogReporting }}
          - name: APPLICATION_LOG_REPORTING_ENABLED
            value: "{{ .Values.logDataFilters.applicationLogReporting.enabled | default true }}"
          - name: APPLICATION_LOG_FILE_REGEX
            value: {{ .Values.logDataFilters.applicationLogReporting.fileRegex | quote }}
          - name: APPLICATION_LOG_LEVEL_THRESHOLD
            value: "{{ .Values.logDataFilters.applicationLogReporting.logLevelThreshold | default "INFO" }}"
          - name: MAX_LOG_SAMPLES_PER_MINUTE
            value: "{{ .Values.logDataFilters.applicationLogReporting.maxSamplesPerMinute | default 10000 }}"
          - name: KEEP_STDSTREAM_LOG_FOR_ENTITY_REGEX
            value: {{ .Values.logDataFilters.applicationLogReporting.keepStdStreamEntityRegex | quote }}
          - name: KEEP_FILE_LOG_FOR_ENTITY_REGEX
            value: {{ .Values.logDataFilters.applicationLogReporting.keepFileEntityRegex | quote }}
          {{- end }}
          {{- end }}

          # DEPRECATED: The following environment variables are deprecated and kept for backward compatibility.
          # If you are using an older configuration file with a newer Helm chart version, these settings will still work.
          # However, please update your configuration to use the new filtering mechanisms.
          # These variables will be removed in a future release.
          - name: APM_DATA_REPORTING
            value: "{{ if hasKey .Values "apmDataReporting" }}{{ .Values.apmDataReporting }}{{ else }}true{{ end }}"
          - name: TCP_STATS_REPORTING
            value: "{{ if hasKey .Values "networkMetricsReporting" }}{{ .Values.networkMetricsReporting }}{{ else if hasKey .Values "tcpStatsReporting" }}{{ .Values.tcpStatsReporting }}{{ else }}true{{ end }}"
          - name: DROP_DATA_NEW_RELIC
            value: "{{ if hasKey .Values "dropDataNewRelic" }}{{ .Values.dropDataNewRelic }}{{ else }}true{{ end }}"
          - name: DROP_APM_ENABLED_PODS
            value: "{{ if hasKey .Values "dropAPMEnabledPods" }}{{ .Values.dropAPMEnabledPods }}{{ else }}false{{ end }}"
          - name: DROP_DATA_FOR_NAMESPACES
            value: "{{ .Values.dropDataForNamespaces | join "," }}"
          - name: DROP_SERVICE_NAME_REGEX
            value: {{ .Values.dropDataServiceNameRegex }}
          - name: ALLOW_SERVICE_NAME_REGEX
            value: {{ .Values.allowServiceNameRegex }}
        securityContext:
          privileged: true
        volumeMounts:
          - name: host-root-volume
            mountPath: /host
            readOnly: true
          - name: sys-volume
            mountPath: /sys
            readOnly: true
          - name: kernel-headers-volume
            mountPath: /kernel-headers
            readOnly: true
          {{- if and .Values.customOtlpEndpointTlsCertSecret .Values.customOtlpEndpointTlsCertSecretKey }}
          - name: otlp-tls-cert
            mountPath: /etc/otlp-tls
            readOnly: true
          {{- end }}
      {{- if .Values.nrdotCollector.enabled }}
      # nrdot per-node collector (kubeletstats). Non-privileged container; shares
      # the agent pod's hostNetwork (reaches the local kubelet on the node) and the
      # agent ServiceAccount (RBAC extended for nodes/stats, nodes/proxy).
      # Egress: agent mode -> localhost OTLP receiver; direct mode -> NR per-account.
      - name: nrdot-collector
        image: {{ include "nr-ebpf-agent.nrdot.image" . }}
        imagePullPolicy: {{ include "nr-ebpf-agent.nrdot.imagePullPolicy" . }}
        # Reads the init-container-patched config from the shared emptyDir (same
        # path). MatchAttributes gate enables metricsgeneration `type: calculate`.
        args: ["--config=/etc/nrdot/pernode.yaml", "--feature-gates=metricsgeneration.MatchAttributes"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources: {{ .Values.nrdotCollector.sidecar.resources | toYaml | nindent 10 }}
        livenessProbe:
          httpGet: { path: /, port: 13133 }
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet: { path: /, port: 13133 }
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
          - name: K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: CLUSTER_NAME
            value: {{ include "nr-ebpf-agent.nrdot.clusterName" . | quote }}
          {{- include "nr-ebpf-agent.nrdot.egressEnv" (dict "ctx" . "agentEndpoint" (printf "127.0.0.1:%v" .Values.nrdotCollector.otlpIngestPort)) | nindent 10 }}
        volumeMounts:
          # Patched config written by the nrdot-get-allocatable init container
          # (the raw ConfigMap is mounted only on that init container).
          - name: nrdot-config-final
            mountPath: /etc/nrdot
            readOnly: true
      {{- end }}
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      hostPID: true
      restartPolicy: Always
      serviceAccountName: {{ include "nr-ebpf-agent.service.name" . }}
      volumes:
      - name: installer-script
        configMap:
          name: {{ include "nr-ebpf-agent.fullname" . }}-installer-script
          defaultMode: 0755
      - name: host-root-volume
        hostPath:
          path: /
          type: Directory
      - name: sys-volume
        hostPath:
          path: /sys
          type: Directory
      - name: kernel-headers-volume
        emptyDir: {}
      {{- if .Values.nrdotCollector.enabled }}
      - name: nrdot-config
        configMap:
          name: {{ include "nr-ebpf-agent.nrdot.configName.pernode" . }}
      # Holds the config after the init container injects per-node allocatable
      # into the metricsgeneration scale_by fields; mounted by the sidecar.
      - name: nrdot-config-final
        emptyDir: {}
      {{- end }}
      {{- if and .Values.customOtlpEndpointTlsCertSecret .Values.customOtlpEndpointTlsCertSecretKey }}
      - name: otlp-tls-cert
        secret:
          secretName: {{ .Values.customOtlpEndpointTlsCertSecret }}
          items:
          - key: {{ .Values.customOtlpEndpointTlsCertSecretKey }}
            path: {{ .Values.customOtlpEndpointTlsCertSecretKey }}
      {{- end }}
      {{- with include "newrelic.common.nodeSelector" . }}
      nodeSelector:
        {{- . | nindent 8 -}}
      {{- end }}
      {{- with include "nrEbpfAgent.ebpfAgent.affinity" . }}
      affinity:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "nrEbpfAgent.ebpfAgent.tolerations" . }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}