{{- if .Values.nrOtelCollector.enabled }}
{{- $region := include "newrelic.common.region" . }}
{{- $cluster := include "newrelic.common.cluster" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nr-ebpf-agent.fullname" . }}-k8s-otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.nrOtelCollector.clusterCollector.configOverride }}
    {{ .Values.nrOtelCollector.clusterCollector.configOverride | nindent 4 }}
    {{- else }}
    receivers:
      prometheus/ksm:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: {{ .Values.nrOtelCollector.clusterCollector.scrapeInterval }}
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - action: keep
                  source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                - action: replace
                  target_label: job_label
                  replacement: kube-state-metrics

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 25
      batch:
        send_batch_max_size: 1000
        timeout: 30s
        send_batch_size: 800

      # Drop scrape-endpoint metadata injected by the Prometheus receiver.
      # These describe the KSM pod itself (service.name=kube-state-metrics,
      # service.instance.id=<ksm-ip>:<port>, server.address, server.port, url.scheme)
      # and must be removed before any entity-level attribution is applied.
      resource/drop_scrape_meta:
        attributes:
          - key: service.name
            action: delete
          - key: service.instance.id
            action: delete
          - key: server.address
            action: delete
          - key: server.port
            action: delete
          - key: url.scheme
            action: delete
          - key: net.host.name
            action: delete
          - key: net.host.port
            action: delete
          - key: http.scheme
            action: delete

      # Combine the three separate container-phase boolean metrics into a single
      # kube_pod_container_status_phase metric with a container_phase label.
      metricstransform/kube_pod_container_status_phase:
        transforms:
          - include: kube_pod_container_status_waiting
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations:
              - action: add_label
                new_label: container_phase
                new_value: waiting
          - include: kube_pod_container_status_running
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations:
              - action: add_label
                new_label: container_phase
                new_value: running
          - include: kube_pod_container_status_terminated
            match_type: strict
            action: update
            new_name: kube_pod_container_status_phase
            operations:
              - action: add_label
                new_label: container_phase
                new_value: terminated

      # Rename the KSM kubernetes_build_info metric to the NR platform convention.
      metricstransform/k8s_cluster_info:
        transforms:
          - include: kubernetes_build_info
            action: update
            new_name: k8s.cluster.info

      # Convert the raw Unix timestamp to a human-readable ISO-8601 string attribute.
      transform/convert_timestamp:
        metric_statements:
          - context: datapoint
            conditions:
              - IsMatch(metric.name, "kube_pod_container_status_last_terminated_timestamp")
            statements:
              - set(datapoint.attributes["kube_pod_container_status_last_terminated_timestamp_formatted"], FormatTime(Unix(Int(datapoint.value_double)), "%Y-%m-%dT%H:%M:%SZ"))

      # Drop zero-value datapoints that represent "false" states and generate noise.
      filter/exclude_zero_value_kube_node_status_condition:
        metrics:
          datapoint:
            - metric.name == "kube_node_status_condition" and value_double == 0.0

      filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase:
        metrics:
          datapoint:
            - metric.name == "kube_persistentvolumeclaim_status_phase" and value_double == 0.0

      filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses:
        metrics:
          datapoint:
            - metric.name == "kube_pod_status_phase" and value_double == 0.0
            - metric.name == "kube_pod_status_ready" and value_double == 0.0
            - metric.name == "kube_pod_status_scheduled" and value_double == 0.0
            - metric.name == "kube_pod_container_status_phase" and value_double == 0.0
            - metric.name == "kube_deployment_status_condition" and value_double == 0.0

      filter/nr_exclude_zero_value_kube_jobs:
        metrics:
          datapoint:
            - metric.name == "kube_job_complete" and value_double == 0.0

      resource/newrelic:
        attributes:
          - key: k8s.cluster.name
            value: {{ $cluster }}
            action: upsert
          - key: newrelic.entity.type
            value: "k8s"
            action: upsert

      # Promote KSM Prometheus metric labels from datapoint attributes to resource
      # attributes so downstream processors operate on the monitored entity.
      # Keys cover all KSM object types; missing keys cause those labels to stay
      # as datapoint attributes and miss the transform/ksm rename step.
      groupbyattrs:
        keys:
          - pod
          - uid
          - container
          - daemonset
          - replicaset
          - statefulset
          - deployment
          - cronjob
          - configmap
          - job
          - job_name
          - horizontalpodautoscaler
          - persistentvolume
          - persistentvolumeclaim
          - endpoint
          - mutatingwebhookconfiguration
          - validatingwebhookconfiguration
          - lease
          - storageclass
          - secret
          - service
          - resourcequota
          - node
          - namespace

      # Clear any stale k8s.* resource attributes, then map raw Prometheus labels
      # to OTel semantic convention names. Must run after groupbyattrs (which
      # promotes the raw labels to resource attrs) and before k8sattributes.
      transform/ksm:
        metric_statements:
          - delete_key(resource.attributes, "k8s.pod.uid")
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.node.name")
          - delete_key(resource.attributes, "k8s.deployment.name")
          - delete_key(resource.attributes, "k8s.replicaset.name")
          - delete_key(resource.attributes, "k8s.statefulset.name")
          - delete_key(resource.attributes, "k8s.daemonset.name")
          - delete_key(resource.attributes, "k8s.job.name")
          - delete_key(resource.attributes, "k8s.cronjob.name")
          - delete_key(resource.attributes, "k8s.replicationcontroller.name")
          - delete_key(resource.attributes, "k8s.hpa.name")
          - delete_key(resource.attributes, "k8s.resourcequota.name")
          - delete_key(resource.attributes, "k8s.volume.name")
          - delete_key(resource.attributes, "k8s.pvc.name")
          - set(resource.attributes["k8s.pod.uid"], resource.attributes["uid"])
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - set(resource.attributes["k8s.deployment.name"], resource.attributes["deployment"])
          - set(resource.attributes["k8s.replicaset.name"], resource.attributes["replicaset"])
          - set(resource.attributes["k8s.statefulset.name"], resource.attributes["statefulset"])
          - set(resource.attributes["k8s.daemonset.name"], resource.attributes["daemonset"])
          - set(resource.attributes["k8s.job.name"], resource.attributes["job_name"])
          - set(resource.attributes["k8s.cronjob.name"], resource.attributes["cronjob"])
          - set(resource.attributes["k8s.replicationcontroller.name"], resource.attributes["replicationcontroller"])
          - set(resource.attributes["k8s.hpa.name"], resource.attributes["horizontalpodautoscaler"])
          - set(resource.attributes["k8s.resourcequota.name"], resource.attributes["resourcequota"])
          - set(resource.attributes["k8s.volume.name"], resource.attributes["volumename"])
          - set(resource.attributes["k8s.volume.name"], resource.attributes["persistentvolume"])
          - set(resource.attributes["k8s.pvc.name"], resource.attributes["persistentvolumeclaim"])
          - delete_key(resource.attributes, "uid")
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "node")
          - delete_key(resource.attributes, "deployment")
          - delete_key(resource.attributes, "replicaset")
          - delete_key(resource.attributes, "statefulset")
          - delete_key(resource.attributes, "daemonset")
          - delete_key(resource.attributes, "job_name")
          - delete_key(resource.attributes, "cronjob")
          - delete_key(resource.attributes, "replicationcontroller")
          - delete_key(resource.attributes, "horizontalpodautoscaler")
          - delete_key(resource.attributes, "resourcequota")
          - delete_key(resource.attributes, "volumename")
          - delete_key(resource.attributes, "persistentvolume")
          - delete_key(resource.attributes, "persistentvolumeclaim")

      # Some KSM volume metrics carry volumename as a datapoint attribute rather
      # than a resource-level label; promote it here so k8s.volume.name is set.
      transform/ksm_datapoints:
        metric_statements:
          - set(resource.attributes["k8s.volume.name"], datapoint.attributes["volumename"])
          - delete_key(datapoint.attributes, "volumename")

      # k8s.pod.name + k8s.namespace.name now refer to the monitored pod (set by
      # transform/ksm), so k8sattributes can correctly look up K8s API metadata.
      # uid-based association is tried first for precision; pod+namespace falls back
      # for metrics about pods that only expose the pod name label (no uid).
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: resource_attribute
              name: k8s.pod.name
            - from: resource_attribute
              name: k8s.namespace.name

      # Convert Prometheus cumulative counters to delta so NR ingest treats them
      # correctly. kube_pod_container_status_restarts_total is excluded because it
      # is already reported as a gauge by KSM.
      cumulativetodelta:
        exclude:
          metrics:
            - kube_pod_container_status_restarts_total
          match_type: strict

    exporters:
      otlphttp:
        endpoint: https://{{ if eq $region "EU" }}otlp.eu01.nr-data.net{{ else if eq $region "Staging" }}staging-otlp.nr-data.net{{ else }}otlp.nr-data.net{{ end }}
        headers:
          api-key: ${env:NEW_RELIC_LICENSE_KEY}
        compression: gzip

    service:
      pipelines:
        metrics:
          receivers: [prometheus/ksm]
          processors:
            - memory_limiter
            - resource/drop_scrape_meta
            - metricstransform/kube_pod_container_status_phase
            - metricstransform/k8s_cluster_info
            - filter/exclude_zero_value_kube_node_status_condition
            - filter/exclude_zero_value_kube_persistentvolumeclaim_status_phase
            - filter/nr_exclude_zero_value_kube_pod_container_deployment_statuses
            - filter/nr_exclude_zero_value_kube_jobs
            - transform/convert_timestamp
            - resource/newrelic
            - groupbyattrs
            - transform/ksm
            - transform/ksm_datapoints
            - k8sattributes
            - cumulativetodelta
            - batch
          exporters: [otlphttp]
    {{- end }}
{{- end }}
