{{- if .Values.nrdotCollector.enabled }}
{{- $direct := eq .Values.nrdotCollector.egressMode "direct" }}
{{- $nsKeys := keys .Values.namespaceLicenseKeys | sortAlpha }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nr-ebpf-agent.nrdot.configName.pernode" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
data:
  pernode.yaml: |
    receivers:
      kubeletstats:
        collection_interval: {{ .Values.nrdotCollector.collectionInterval }}
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups: [node, pod, container, volume]
        extra_metadata_labels: [container.id]
        # Pod/container CPU & memory utilization (vs requests/limits). Off by
        # default in the receiver; the K8s UI's pod/container utilization views
        # read these. kubeletstats computes them from kubelet usage + pod-spec
        # requests/limits (no KSM, no metric generation).
        metrics:
          k8s.container.cpu_limit_utilization:
            enabled: true
          # TODO (test) : Container-level request/limit utilization. NOT enabled by the canonical
          # nr-k8s-otel-collector chart (it relies on pod-level only), so the K8s
          # Navigator's per-container "CPU/Mem Utilization (request)" tile had no
          # native metric and rendered a wrong value. nri-kubernetes reports these
          # per container; enabling them restores parity for all four container tiles.
          k8s.container.cpu_request_utilization:
            enabled: true
          k8s.container.memory_request_utilization:
            enabled: true
          k8s.container.memory_limit_utilization:
            enabled: true
          k8s.pod.cpu_limit_utilization:
            enabled: true
          k8s.pod.cpu_request_utilization:
            enabled: true
          k8s.pod.memory_limit_utilization:
            enabled: true
          k8s.pod.memory_request_utilization:
            enabled: true
          # Pod volume usage (canonical chart enables it) — feeds pod volume views.
          k8s.pod.volume.usage:
            enabled: true
      prometheus/cadvisor:
        config:
          scrape_configs:
            - job_name: cadvisor
              scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
                server_name: kubernetes
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - replacement: kubernetes.default.svc.cluster.local:443
                  target_label: __address__
                - regex: (.+)
                  replacement: /api/v1/nodes/$${1}/proxy/metrics/cadvisor
                  source_labels: [__meta_kubernetes_node_name]
                  target_label: __metrics_path__
                - source_labels: [__meta_kubernetes_node_name]
                  regex: ${env:K8S_NODE_NAME}
                  action: keep
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'container_(cpu_usage_seconds_total|cpu_cfs_periods_total|cpu_cfs_throttled_periods_total|memory_working_set_bytes|memory_usage_bytes|memory_mapped_file|network_receive_bytes_total|network_transmit_bytes_total|network_receive_errors_total|network_transmit_errors_total|fs_usage_bytes|fs_capacity_bytes|spec_memory_limit_bytes)'
                  action: keep
                - source_labels: [__name__, container]
                  regex: 'container_(cpu|memory|fs|spec).*;$'
                  action: drop
                - source_labels: [container]
                  regex: 'POD'
                  action: drop
                - source_labels: [interface]
                  regex: 'lo'
                  action: drop
      # Kubelet's own /metrics Prometheus endpoint (kubelet_*, plus storage/runtime/
      # rest_client/workqueue/go/process series). Mirrors nr-k8s-otel-collector's
      # daemonset `kubelet` scrape job — same apiserver-proxy pattern as cadvisor, but
      # path /metrics instead of /metrics/cadvisor. Kept UNFILTERED to match canonical
      # (canonical trims volume via low-data-mode, which we don't run — if kubelet ingest
      # volume needs trimming, add a metric_relabel_configs keep-filter here).
      #
      # TODO(anmoljain): kubelet /metrics (kubelet_*) is NOT collected by nri-bundle
      # (neither nri-kubernetes, which uses the /stats/summary API -> K8sNodeSample, nor
      # the newrelic-prometheus-agent, which only scrapes annotated app endpoints). It IS
      # scraped by the canonical nrdot nr-k8s-otel-collector. So this job is canonical
      # parity, additive vs nri-bundle. Keeping & commenting it for now (canonical is not our parity
      # yardstick); revisit if we decide to not hold strict nri-bundle-only parity.
    #  prometheus/kubelet:
    #    config:
    #      scrape_configs:
    #        - job_name: kubelet
    #          scrape_interval: {{ .Values.nrdotCollector.collectionInterval }}
    #          scheme: https
    #          tls_config:
    #            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    #            insecure_skip_verify: false
    #            server_name: kubernetes
    #          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    #          kubernetes_sd_configs:
    #            - role: node
    #          relabel_configs:
    #            - replacement: kubernetes.default.svc.cluster.local:443
    #              target_label: __address__
    #            - regex: (.+)
    #              replacement: /api/v1/nodes/$${1}/proxy/metrics
    #              source_labels: [__meta_kubernetes_node_name]
    #              target_label: __metrics_path__
    #            - source_labels: [__meta_kubernetes_node_name]
    #              regex: ${env:K8S_NODE_NAME}
    #              action: keep
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.replicaset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources: [{ from: resource_attribute, name: k8s.pod.ip }]
          - sources: [{ from: resource_attribute, name: k8s.pod.uid }]
          - sources: [{ from: connection }]
      resourcedetection/cloudproviders:
        detectors: [gcp, eks, ec2, aks, azure]
        timeout: 2s
        override: false
        # EKS detector: on the API fallback path (when node IMDS is unreachable) it
        # reads the node name from this env var. Without it, node name is empty and the
        # collector fails to start on EKS ("can't get K8s Instance Metadata; node name
        # is empty"). This sidecar runs hostNetwork so IMDS is normally reachable, but
        # this keeps the fallback safe. Mirrors nr-k8s-otel-collector's eks config.
        eks:
          node_from_env_var: K8S_NODE_NAME
      resource/newrelic:
        attributes:
          - key: k8s.cluster.name
            value: ${env:CLUSTER_NAME}
            action: upsert
          - key: newrelic.entity.type
            value: "k8s"
            action: upsert
      resource/drop_scrape_meta:
        attributes:
          - { key: service.name, action: delete }
          - { key: service.instance.id, action: delete }
          - { key: server.address, action: delete }
          - { key: server.port, action: delete }
          - { key: url.scheme, action: delete }
          - { key: net.host.name, action: delete }
          - { key: net.host.port, action: delete }
          - { key: http.scheme, action: delete }
      groupbyattrs:
        keys: [pod, namespace, container, node, image]
      transform/cadvisor_attrs:
        metric_statements:
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.node.name")
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "node")
      k8sattributes/cadvisor:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.uid
            - k8s.pod.start_time
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.replicaset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources:
            - { from: resource_attribute, name: k8s.pod.name }
            - { from: resource_attribute, name: k8s.namespace.name }
      # Pod request/limit ratio, divided from the kubeletstats utilization
      # metrics enabled above (type: calculate needs the metricsgeneration
      # MatchAttributes feature gate, set on the sidecar args).
      metricsgeneration/calculate_percentage_for_pods:
        rules:
          - name: k8s.pod.memory_request_limit_ratio
            type: calculate
            metric1: k8s.pod.memory_limit_utilization
            metric2: k8s.pod.memory_request_utilization
            operation: divide
          - name: k8s.pod.cpu_request_limit_ratio
            type: calculate
            metric1: k8s.pod.cpu_limit_utilization
            metric2: k8s.pod.cpu_request_utilization
            operation: divide
      # --- Per-node CPU/memory usage % (powers the K8s cluster CPU/mem gauges) ---
      # Sum container usage per node, then divide by the node's allocatable
      # (injected into the scale_by placeholders below by the nrdot-get-allocatable
      # init container). The aggregation pipeline has no k8sattributes processor,
      # and kubeletstats doesn't stamp k8s.node.name on container metrics itself,
      # so set it explicitly from this per-node sidecar's K8S_NODE_NAME env. Without
      # this, all containers collapse into one node-less series (cluster total ÷
      # one node's allocatable) and the UI can't attribute it to nodes.
      resource/node_identity:
        attributes:
          - key: k8s.node.name
            value: ${env:K8S_NODE_NAME}
            action: upsert
      transform/strip_labels_for_per_node_aggregation:
        metric_statements:
          - context: datapoint
            statements:
              - keep_keys(resource.attributes, ["k8s.node.name"]) where metric.name == "container.cpu.usage"
              - keep_keys(resource.attributes, ["k8s.node.name"]) where metric.name == "container.memory.usage"
      groupbyattrs/node:
        keys: [k8s.node.name]
      metricstransform/sum_container_metrics_per_node:
        transforms:
          - include: container.cpu.usage
            action: insert
            new_name: node.container.cpu.usage.sum
            operations:
              - action: aggregate_labels
                label_set: [k8s.node.name]
                aggregation_type: sum
          - include: container.memory.usage
            action: insert
            new_name: node.container.memory.usage.sum
            operations:
              - action: aggregate_labels
                label_set: [k8s.node.name]
                aggregation_type: sum
      metricsgeneration/calculate_percentage:
        rules:
          - name: node.cpu.usage.percentage
            type: scale
            metric1: node.container.cpu.usage.sum
            scale_by: <NODE_CPU_ALLOCATABLE_PLACEHOLDER>
            operation: divide
          - name: node.memory.usage.percentage
            type: scale
            metric1: node.container.memory.usage.sum
            scale_by: <NODE_MEMORY_ALLOCATABLE_PLACEHOLDER>
            operation: divide
      filter/keep_only_generated_metrics:
        metrics:
          include:
            match_type: strict
            metric_names:
              - node.cpu.usage.percentage
              - node.memory.usage.percentage
      cumulativetodelta: {}
      batch:
        send_batch_size: 800
        send_batch_max_size: 1000
        timeout: {{ .Values.nrdotCollector.collectionInterval }}
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    {{- if $direct }}
    {{- if $nsKeys }}
    connectors:
      routing:
        error_mode: ignore
        default_pipelines: [metrics/acct-default]
        table:
        {{- range $i, $ns := $nsKeys }}
          - context: resource
            condition: attributes["k8s.namespace.name"] == {{ $ns | quote }}
            pipelines: [metrics/acct-{{ $i }}]
        {{- end }}
    {{- end }}
    exporters:
      otlphttp/acct-default:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NEW_RELIC_LICENSE_KEY}"}
        compression: gzip
    {{- range $i, $ns := $nsKeys }}
      otlphttp/acct-{{ $i }}:
        endpoint: ${env:NR_OTLP_ENDPOINT}
        headers: {"api-key": "${env:NR_INGEST_KEY_{{ $i }}}"}
        compression: gzip
    {{- end }}
    service:
      extensions: [health_check]
      pipelines:
        metrics/in:
          receivers: [kubeletstats]
          processors: [memory_limiter, metricsgeneration/calculate_percentage_for_pods, k8sattributes, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        # Per-node CPU/memory usage % (cluster gauge). Separate copy of the
        # kubeletstats stream; filter/keep_only_generated_metrics drops everything
        # except the two generated percentages, so nothing here is double-counted.
        metrics/aggregation:
          receivers: [kubeletstats]
          processors: [memory_limiter, resource/node_identity, transform/strip_labels_for_per_node_aggregation, groupbyattrs/node, metricstransform/sum_container_metrics_per_node, metricsgeneration/calculate_percentage, filter/keep_only_generated_metrics, resource/newrelic, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        metrics/cadvisor:
          receivers: [prometheus/cadvisor]
          processors: [memory_limiter, resource/drop_scrape_meta, groupbyattrs, transform/cadvisor_attrs, resourcedetection/cloudproviders, resource/newrelic, k8sattributes/cadvisor, cumulativetodelta, batch]
          exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        # Kubelet /metrics (node-scoped: no pod/namespace label, so no cadvisor-style attr
        # remap). resource/node_identity stamps k8s.node.name from $K8S_NODE_NAME (this
        # sidecar is per-node). No namespace ⇒ routing sends it to the default account.
        # Commented out with the prometheus/kubelet receiver above — kubelet /metrics is
        # canonical-only (additive vs nri-bundle) and high-volume (e.g. go_gc_heap_*_by_size_bytes).
        # Re-enable together with the receiver if strict nri-bundle parity is dropped.
        # metrics/kubelet:
        #   receivers: [prometheus/kubelet]
        #   processors: [memory_limiter, resource/drop_scrape_meta, resource/node_identity, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
        #   exporters: [{{ if $nsKeys }}routing{{ else }}otlphttp/acct-default{{ end }}]
        {{- if $nsKeys }}
        metrics/acct-default:
          receivers: [routing]
          exporters: [otlphttp/acct-default]
        {{- range $i, $ns := $nsKeys }}
        metrics/acct-{{ $i }}:
          receivers: [routing]
          exporters: [otlphttp/acct-{{ $i }}]
        {{- end }}
        {{- end }}
    {{- else }}
    exporters:
      otlp/agent:
        endpoint: ${env:AGENT_OTLP_ENDPOINT}
        tls:
          insecure: true
        compression: gzip
    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [kubeletstats]
          processors: [memory_limiter, metricsgeneration/calculate_percentage_for_pods, k8sattributes, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
          exporters: [otlp/agent]
        # Per-node CPU/memory usage % (cluster gauge). See the direct-mode block.
        metrics/aggregation:
          receivers: [kubeletstats]
          processors: [memory_limiter, resource/node_identity, transform/strip_labels_for_per_node_aggregation, groupbyattrs/node, metricstransform/sum_container_metrics_per_node, metricsgeneration/calculate_percentage, filter/keep_only_generated_metrics, resource/newrelic, batch]
          exporters: [otlp/agent]
        metrics/cadvisor:
          receivers: [prometheus/cadvisor]
          processors: [memory_limiter, resource/drop_scrape_meta, groupbyattrs, transform/cadvisor_attrs, resourcedetection/cloudproviders, resource/newrelic, k8sattributes/cadvisor, cumulativetodelta, batch]
          exporters: [otlp/agent]
        # Kubelet /metrics — commented out with the prometheus/kubelet receiver above
        # (canonical-only, high-volume). See the direct-mode block for rationale.
        # metrics/kubelet:
        #   receivers: [prometheus/kubelet]
        #   processors: [memory_limiter, resource/drop_scrape_meta, resource/node_identity, resourcedetection/cloudproviders, resource/newrelic, cumulativetodelta, batch]
        #   exporters: [otlp/agent]
    {{- end }}
{{- end }}
