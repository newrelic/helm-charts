components:
  frontendProxy:
    service:
      type: LoadBalancer
  frontend:
    resources:
      limits:
        memory: 400Mi

opentelemetry-collector:
  config:
    exporters:
      otlp_http/newrelic:
        endpoint: https://otlp.nr-data.net:4317
        headers:
          api-key: NEW_RELIC_LICENSE_KEY

    processors:
      resource:
        attributes:
          - key: k8s.cluster.name
            value: SCENARIO_TAG
            action: insert

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_http/newrelic]
        metrics:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_http/newrelic]
        logs:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp_http/newrelic]
