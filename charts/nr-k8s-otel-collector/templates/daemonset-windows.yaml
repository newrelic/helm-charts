{{- if .Values.windows.enabled }}
{{- range .Values.windows.versions }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nrKubernetesOtel.daemonset.fullname" $ }}-windows-{{ .version }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" $ | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "newrelic.common.labels.selectorLabels" $ | nindent 6 }}
      component: daemonset-windows-{{ .version }}
  template:
    metadata:
      labels:
        {{- include "newrelic.common.labels.podLabels" $ | nindent 8 }}
        component: daemonset-windows-{{ .version }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/daemonset-windows-configmap.yaml") $ | sha256sum }}
        {{- with $.Values.windows.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      imagePullSecrets:
        - name: nr-internal
      serviceAccountName: {{ include "newrelic.common.serviceAccount.name" $ }}
      {{- with include "newrelic.common.priorityClassName" $ }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with include "newrelic.common.dnsConfig" $ }}
      dnsConfig:
        {{- . | nindent 8 }}
      {{- end }}
      # No initContainers: Windows pods cannot run Linux init images.
      # metricsgeneration/calculate_percentage is skipped on Windows for this reason.
      containers:
        - name: otel-collector-daemonset
          # No securityContext: runAsUser, capabilities, readOnlyRootFilesystem are not applicable on Windows.
          image: newrelic/nri-kubernetes-internal:nrdotwin-ltsc2022-2
          imagePullPolicy: {{ $.Values.windows.image.pullPolicy }}
          args:
            - "--config"
            - 'C:\config\daemonset-config.yaml'
            - "--feature-gates"
            - "-processor.resourcedetection.propagateerrors"
            {{- with $.Values.windows.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $.Values.windows.resources | nindent 12 }}
          {{- with $.Values.windows.envsFrom }}
          envFrom:
            {{- . | toYaml | nindent 12 }}
          {{- end }}
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.instance.id=$(POD_NAME),k8s.pod.uid=$(POD_UID),k8s.node.name=$(KUBE_NODE_NAME),host.name=$(KUBE_NODE_NAME)
            - name: NR_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "newrelic.common.license.secretName" $ }}
                  key: {{ include "newrelic.common.license.secretKeyName" $ }}
          {{- if include "newrelic.common.proxy" $ }}
            - name: http_proxy
              value: "{{- include "newrelic.common.proxy" $ }}"
            - name: https_proxy
              value: "{{- include "newrelic.common.proxy" $ }}"
          {{- end }}
            {{- with $.Values.windows.envs }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: varlogpods
              mountPath: 'C:\var\log\pods'
              readOnly: true
            - name: daemonset-windows-config
              mountPath: 'C:\config'
      volumes:
        - name: varlogpods
          hostPath:
            path: 'C:\var\log\pods'
        - name: daemonset-windows-config
          configMap:
            name: {{ include "nrKubernetesOtel.daemonset.windows.configMap.fullname" $ }}
      nodeSelector:
        kubernetes.io/os: windows
        node.kubernetes.io/windows-build: {{ .buildNumber | quote }}
        {{- with $.Values.windows.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      tolerations:
        - key: "node.kubernetes.io/os"
          operator: "Equal"
          value: "windows"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/windows-build"
          operator: "Equal"
          value: {{ .buildNumber | quote }}
          effect: "NoSchedule"
        {{- with $.Values.windows.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
