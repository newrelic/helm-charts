suite: Validate AC deployment secret render
chart:
  appVersion: 0.0.0

tests:
  - it: should reflect values from Values.agentControlDeployment.chartValues when default
    asserts:
      - template: templates/ac-deployment-secret.yaml
        equal:
          decodeBase64: true
          path: data["agent-control-deployment.yaml"]
          value: |-
            subAgentsNamespace: newrelic

  - it: should set cdRemoteUpdate as false when agentControlCd is disabled
    set:
      agentControlCd:
        enabled: false
    asserts:
      - template: templates/ac-deployment-secret.yaml
        equal:
          decodeBase64: true
          path: data["agent-control-deployment.yaml"]
          value: |-
            config:
              cdRemoteUpdate: false
            subAgentsNamespace: newrelic

  - it: should set only cdRemoteUpdate as false when agentControlCd is disabled even if the value is set to true
    set:
      agentControlDeployment:
        chartValues:
          config:
            cdRemoteUpdate: true
            extraNestedValues: unchanged
          extraValues: unchanged
      agentControlCd:
        enabled: false
    asserts:
      - template: templates/ac-deployment-secret.yaml
        equal:
          decodeBase64: true
          path: data["agent-control-deployment.yaml"]
          value: |-
            config:
              cdRemoteUpdate: false
              extraNestedValues: unchanged
            extraValues: unchanged
            subAgentsNamespace: newrelic

  - it: should set false for cdRemoteUpdate when agentControlCd is enabled and the value is set
    set:
      agentControlDeployment:
        chartValues:
          config:
            cdRemoteUpdate: false
      agentControlCd:
        enabled: true
    asserts:
      - template: templates/ac-deployment-secret.yaml
        equal:
          decodeBase64: true
          path: data["agent-control-deployment.yaml"]
          value: |-
            config:
              cdRemoteUpdate: false
            subAgentsNamespace: newrelic

