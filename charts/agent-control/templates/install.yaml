{{- if (not (index .Values "agent-control-deployment").disableRemoteUpdate) -}}
{{- $installJobName := include "newrelic.common.naming.truncateToDNSWithSuffix" ( dict "name" (include "newrelic.common.naming.fullname" .) "suffix" "install-job" ) -}}
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  name: {{ $installJobName }}
  namespace: {{ .Release.Namespace }}
spec:
  template:
    spec:
      restartPolicy: Never
      # TODO: Change this to a more specific service account.
      serviceAccountName: helm-controller  # Hardcoded on flux2 chart.
      containers:
        - name: install-agent-control-deployment
          # TODO: Pin a version to avoid problems with breaking changes.
          image: newrelic/newrelic-agent-control-cli
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          command:
            - newrelic-agent-control-cli
            - install-agent-control
            - --release-name
            - "{{ .Release.Name }}-deployment"
            - --chart-version
            - "*"
            - --secrets
            - "{{ .Release.Name }}-deployment=agent-control-deployment.yaml,{{ .Release.Name }}-deployment=global.yaml"
            - --namespace
            - "{{ .Release.Namespace }}"
{{- end -}}