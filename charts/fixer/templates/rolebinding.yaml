{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fixer.fullname" . }}
  labels:
    {{- include "fixer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fixer.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "fixer.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
