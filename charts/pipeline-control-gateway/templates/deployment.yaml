apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nrKubernetesOtel.deployment.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "newrelic.common.labels" . | nindent 4 }}
spec:
  replicas: 1
  minReadySeconds: 5
  selector:
    matchLabels:
      {{- include "newrelic.common.labels.selectorLabels" . | nindent 6 }}
      component: deployment
  template:
    metadata:
      labels:
        {{- include "newrelic.common.labels.podLabels" . | nindent 8 }}
        component: deployment
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/deployment-configmap.yaml") . | sha256sum }}
        {{- with .Values.deployment.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "newrelic.common.serviceAccount.name" . }}
      {{- with include "nrKubernetesOtel.deployment.securityContext.pod" . }}
      securityContext:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "newrelic.common.priorityClassName" . }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with include "newrelic.common.dnsConfig" . }}
      dnsConfig:
        {{- . | nindent 8 }}
      {{- end }}
      containers:
        - name: pipeline-control-gateway
          {{- with include "nrKubernetesOtel.deployment.securityContext.container" . }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["./pipeline-control-gateway", "--config", "/config/deployment-config.yaml"]
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
          {{- with .Values.deployment.envsFrom }}
          envFrom:
            {{- . | toYaml | nindent 12 }}
          {{- end }}
          env:
            - name: NEW_RELIC_HOST
              value: {{ include "nrKubernetesOtel.NrHost.endpoint" . }}
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: GATEWAY_CONFIG_FILE_PATH
              value: /config/gateway-config.yaml
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "newrelic.common.license.secretName" . }}
                  key: {{ include "newrelic.common.license.secretKeyName" . }}
            {{- with .Values.deployment.envs }}
            {{- . | toYaml | nindent 12 }}
            {{- end }}
          ports:
            - name: otlp-http
              containerPort: {{ .Values.ports.otlpHttp }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.ports.otlpGrpc }}
              protocol: TCP
            - name: nr-http
              containerPort: {{ .Values.ports.nrHttp }}
              protocol: TCP
            - name: health-http
              containerPort: {{ .Values.ports.healthHttp }}
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health/status
              port: {{ .Values.ports.healthHttp }}
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /health/status
              port: {{ .Values.ports.healthHttp }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: deployment-config
              mountPath: /config
        {{- if and .Values.deployment.customConfigMap .Values.deployment.configWatcher.enabled }}
        - name: config-watcher
          image: {{ .Values.deployment.configWatcher.image }}
          imagePullPolicy: {{ .Values.deployment.configWatcher.imagePullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e

              CONFIGMAP_NAME="{{ .Values.deployment.customConfigMap }}"
              NAMESPACE="{{ .Release.Namespace }}"
              POD_NAME="${MY_POD_NAME}"

              echo "Config watcher started. Monitoring ConfigMap: ${CONFIGMAP_NAME}"
              echo "Will restart pod: ${POD_NAME} in namespace: ${NAMESPACE} when a configuration update is detected"

              # Get initial resource version
              LAST_VERSION=$(kubectl get configmap ${CONFIGMAP_NAME} -n ${NAMESPACE} -o jsonpath='{.metadata.resourceVersion}')
              echo "Initial ConfigMap resourceVersion: ${LAST_VERSION}"

              # Watch for changes - use --watch instead of --watch-only to get immediate events
              kubectl get configmap ${CONFIGMAP_NAME} -n ${NAMESPACE} --watch -o jsonpath='{.metadata.resourceVersion}{"\n"}' | while read -r CURRENT_VERSION; do
                if [ -z "$CURRENT_VERSION" ]; then
                  continue
                fi

                echo "Event received. ResourceVersion: ${CURRENT_VERSION}"

                if [ "$CURRENT_VERSION" != "$LAST_VERSION" ]; then
                  echo "ConfigMap change detected! ResourceVersion changed from ${LAST_VERSION} to ${CURRENT_VERSION}"
                  echo "Deleting pod ${POD_NAME} to trigger restart..."

                  kubectl delete pod ${POD_NAME} -n ${NAMESPACE} --grace-period=30

                  echo "Pod deletion initiated. Kubernetes will recreate the pod with new config."
                  exit 0
                fi

                LAST_VERSION=$CURRENT_VERSION
              done
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
        {{- end }}
      volumes:
        - name: deployment-config
          {{- if .Values.deployment.customConfigMap }}
          configMap:
            name: {{ .Values.deployment.customConfigMap }}
          {{- else }}
          configMap:
            name: {{ include "nrKubernetesOtel.deployment.fullname" . }}-config
          {{- end }}
      {{- with include "nrKubernetesOtel.deployment.nodeSelector" . }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "nrKubernetesOtel.deployment.affinity" . }}
      affinity:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with include "nrKubernetesOtel.deployment.tolerations" . }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
