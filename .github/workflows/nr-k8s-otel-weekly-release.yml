name: Weekly Release (nr-k8s-otel-collector)

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency: nr-k8s-otel-weekly-release

env:
  ORIGINAL_REPO_NAME: ${{ github.event.repository.full_name }}
  CHART_PATH: charts/nr-k8s-otel-collector

permissions:
  contents: read

jobs:
  validate-gh-pages-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Only needs to read gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Download remote index file and check equality
        run: |
          curl -vsSL https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.yaml > index.yaml.remote
          LOCAL="$(md5sum < index.yaml)"
          REMOTE="$(md5sum < index.yaml.remote)"
          echo "$LOCAL" = "$REMOTE"
          test "$LOCAL" = "$REMOTE"

  calculate-and-release:
    runs-on: ubuntu-latest
    needs: [validate-gh-pages-index]
    permissions:
      contents: write  # Needed to push version bump commit and create releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git log and chart-releaser
          token: ${{ secrets.K8S_AGENTS_BOT_TOKEN }}  # Use bot token to allow triggering other workflows

      - name: Configure Git
        run: |
          git config user.name "k8s-agents-bot"
          git config user.email "k8s-agents-bot@users.noreply.github.com"

      - name: Get last release tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match='nr-k8s-otel-collector-*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release found, will use current version"
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "Last release tag: $LAST_TAG"
            echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Calculate next version
        id: next_version
        run: |
          if [ -z "${{ steps.last_tag.outputs.tag }}" ]; then
            # No previous release, use current version
            CURRENT_VERSION=$(yq '.version' ${CHART_PATH}/Chart.yaml)
            echo "No previous release, using current version: $CURRENT_VERSION"
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(./scripts/calculate-chart-version.sh ${CHART_PATH} ${{ steps.last_tag.outputs.tag }})
            CURRENT_VERSION=$(yq '.version' ${CHART_PATH}/Chart.yaml)

            echo "Current version: $CURRENT_VERSION"
            echo "Calculated version: $NEW_VERSION"

            if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
              echo "No relevant commits since last release, skipping version bump"
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "has_changes=false" >> $GITHUB_OUTPUT
            else
              # Validate version format (semver)
              if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "❌ Invalid version format: $NEW_VERSION (expected: X.Y.Z)"
                exit 1
              fi

              # Validate version numbers are reasonable (prevent version bombing)
              IFS='.' read -r major minor patch <<< "$NEW_VERSION"
              if [ "$major" -gt 100 ] || [ "$minor" -gt 100 ] || [ "$patch" -gt 100 ]; then
                echo "❌ Suspicious version numbers: $NEW_VERSION (components should be < 100)"
                exit 1
              fi

              echo "Version validation passed: $NEW_VERSION"
              echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Add helm repositories
        run: |
          helm repo add newrelic-cdn-helm-charts https://helm-charts.newrelic.com  # for common-library
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts  # for kube-state-metrics

      - name: Update chart dependencies
        if: steps.next_version.outputs.has_changes == 'true'
        run: |
          helm dependency update ${CHART_PATH}

      - name: Update Chart.yaml version
        if: steps.next_version.outputs.has_changes == 'true'
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.version }}"
          echo "Updating Chart.yaml to version $NEW_VERSION"
          yq -i ".version = \"$NEW_VERSION\"" ${CHART_PATH}/Chart.yaml

          git diff ${CHART_PATH}/Chart.yaml

      - name: Regenerate examples with new version
        if: steps.next_version.outputs.has_changes == 'true'
        run: |
          make generate-examples

      - name: Commit version bump and regenerated examples
        if: steps.next_version.outputs.has_changes == 'true'
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.version }}"
          git add ${CHART_PATH}/Chart.yaml ${CHART_PATH}/examples/
          git commit -m "chore(nr-k8s-otel-collector): bump version to $NEW_VERSION"
          git push origin master

      - name: Package chart manually
        if: steps.next_version.outputs.has_changes == 'true'
        run: |
          mkdir -p .cr-release-packages
          helm package ${CHART_PATH} -d .cr-release-packages/

      - name: Release nr-k8s-otel-collector chart
        if: steps.next_version.outputs.has_changes == 'true'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .cr-release-packages
          skip_packaging: true
        env:
          # Use bot token to allow triggering post-release workflow
          CR_TOKEN: "${{ secrets.K8S_AGENTS_BOT_TOKEN }}"
          CR_SKIP_EXISTING: true
          # Workaround for chart-releaser-action bug: set latest_tag to prevent
          # "unbound variable" error at line 111 of cr.sh when skip_packaging=true
          latest_tag: ${{ steps.last_tag.outputs.tag }}

      - name: No changes to release
        if: steps.next_version.outputs.has_changes == 'false'
        run: |
          echo "No relevant commits since last release. Skipping release."
          echo "To trigger a release, merge PRs with conventional commit messages:"
          echo "  - feat: for minor version bump"
          echo "  - fix: or chore: for patch version bump"
          echo "  - feat!: for major version bump"
          echo "  - fix!: for major version bump"

  notify-failure:
    if: ${{ always() && failure() }}
    needs: [validate-gh-pages-index, calculate-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read  # No write permissions needed for notifications
    steps:
      - name: Notify failure via Slack
        uses: archive/github-actions-slack@v2.10.1
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.K8S_AGENTS_SLACK_TOKEN }}
          slack-channel: ${{ secrets.K8S_AGENTS_SLACK_CHANNEL }}
          slack-text: "❌ `${{ env.ORIGINAL_REPO_NAME }}`: <${{ github.server_url }}/${{ env.ORIGINAL_REPO_NAME }}/actions/runs/${{ github.run_id }}|'Weekly Release (nr-k8s-otel-collector)' failed>."
